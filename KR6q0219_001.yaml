body:
  text: 雲溪俍亭道人淨挺著豫章燈巖居士文德翼閲逍遙遊莊子遊方之外者也屈子遠遊未離於域內也故夫馳域外之觀者則無往不適也自適己適而非適人之適者也通云踏毗盧頂上行駕鐵船入滄海北溟有魚至六月息者也魚耶鳥耶南耶北耶冥冥者不知其誰適也三千耶九萬耶去耶來耶六月息耶息相吹耶蝶之夢為周耶周之夢為蝶耶通云佛身非身是名大身文云如金翅鳥直取龍吞度越恆等野馬也至若是則已矣天果蒼蒼也乎地之視天猶天之視地也吾不知其視地也亦疑以為蒼蒼否也地之下可為天也天之上猶然地也日推蕩於塵埃野馬之中而莫之紀極也彼亦一塵埃也此亦一塵埃也通云譬之於水蛟龍視為窟宅餓鬼視為火輪諸天視為七寶有定形耶有定名耶且夫水之積也不厚至不亦悲乎譬若使虻負山精衛填海也必無及矣冥靈望大樁大樁遠甚彭祖望冥靈冥靈遠甚其相去可為道里耶通云毗目執善財手經歷塵劫是一剎那耶是俱胝耶是洛乂耶是阿僧祗耶是那由他耶試定當看湯之問棘也是已棘之言曰物各有極任之則條暢有極耶無極耶通云棘狐棘也過得荊棘林始是好手窮髮之北至小大之辨也下士聞道大笑之斥鷃類也蜩與鷽鳩類也通云須彌內芥子且置如何是芥子內須彌聻問窮髮之北似重復否答南冥為天池故必待徒北冥為天池不待徒矣前云鯤化為鵬猶然待化也後則不待化矣語有差別故夫知效一官至聖人無名定內外辨榮辱豈數數於世哉榮子加於人一等矣雖然未也列子御風而行泠然善也豈數數於致福哉雖然未也猶有待者也有待者非無待者也足於己無待於物至人無己靡所不己無功而功卒歸之無名而名卒從之神之至聖之盡也通云會萬物為自己者其惟聖人乎南泉指牡丹花謂陸亙曰時人見此一株花如夢相似堯讓天下於許由至不越樽俎而代之矣兩相賢則兩相讓也堯非以天下為桎梏也由非以天下為次且也魚相忘於江湖人相忘於道術通云黧奴白牯雲在嶺頭三世諸佛水流澗底肩吾問於連叔至孰肯以物為事御皇英從虙妃其藐姑射之謂耶驂赤豹駕青螭乘雲龍而遊八極也吸木蘭之墜露餐沆瀣以為漿不足異矣之人也將旁礡萬物以蘄乎亂者也孰以天下為事哉之人也水九年而不為濡旱七年而不為爇固將糠秕堯舜者也孰以物為事哉斷鰲足奠地維練五色石補天信有之矣通云百億日月百億須彌還信得及麼若信不及且到藐姑射山問取仙子宋人資章甫而適越越人斷髮文身無所用之胡人毳越人布北人馬南人舟夫物亦各循所尚耳宋人有獻玉於子罕者子罕曰爾以玉為寶我以不貪為寶不如人有其寶爰居集於魯魯人饗之鐘鼓三日爰居去非其好也通云我王庫內無如是刀堯治天下之民至窅然喪其天下焉彼四子者殆非人哉許由猶人也齧缺猶人也王倪被衣亦猶人也非四子大而堯實小也堯以治治之四子以不治治之也通云洞山見龍山龍曰我不從雲水入又曰我不從人天來藐姑射之山汾水之陽且要問個消息惠子謂莊子魏王貽我大瓠至有蓬之心也夫瓠一也善用則可以為大樽不善用則瓠落而無所容不龜手一也善用則可以封不善用則但為汧澼絖今乃以莫邪刈薪以金玉抵鵲不知量矣故善任術者審所用通云石鞏弓道吾笏雪峰木毬也只用慣他家死法要去活人未免千年滯貨惠子謂莊子吾有大樹至安所困苦哉樗以無用為用者耳犛牛不能執鼠疑無用也豈與狸狌比力哉卑身而伏罔罟從之智有所不逮能有所不及也犛牛者吾知免矣臃腫卷曲以不才終其天年故知無用之用妙於用者也無所可用安所困苦以是終逍遙焉通云大辨若訥大巧若拙世尊良久德山低頭雪峰住持事繁達磨云不識不識問如何是無何有之鄉答無陰陽地一片齊物論果且有物乎哉果且無物乎哉論之者言也忘物者齊物者也知不齊之為齊者忘物者也於我無我於物無物因其是而是物莫不是因其非而非物莫不非故忘物也兩行者齊物者也故曰論物不齊任之則一通云松亦不直棘亦不曲玄者非烏白者非鵠鶴不須截鳧不須續灼灼黃花森森翠竹南郭子綦隱几而坐至嗒焉似喪其耦淡然若忘忽然若遺喪其所懷來而莫知其所止古之人也夫古之人也夫通云渠不是汝汝正是渠吾自偶偕我今獨往顏成子游立侍於前至非昔之隱几者也形骸可化今是昔非通云估木上糝些子花又云檢點將來有甚氣息亦是病今者吾喪我吾所大患為吾有身通云乃至無我得成於忍女聞地籟而未聞人籟女聞人籟而未聞天籟言發之而成聲所謂籟也有天籟有地籟有人籟師心者人也不師心者天也體乎天均和以天倪注酌乎天府皆天也其去人遠者其與天近者也通云婆婆和和有句無句若將耳聽終難會眼裡聞聲便得知大塊噫氣至調調之刁刁乎翏翏者可聞者也調調刁刁可見者也其怒易知也形與聲相觸而成音也似鼻似口似窪似污者形也激者謞者突者咬者聲也一唱一和參差不齊于者類竽主唱喁者類魚主和冷者風之小飄者風之大厲者風之變也地籟蓋之矣通云夜來好風夜來好風是什麼風吹折門前一株松地籟則衆竅是已至敢問天籟以其所已知求通乎所未知通云砂裡尋油稱錘上呷汁吹萬不同至怒者其誰耶言非吹也吹未始非言也吹萬不同言滿天下矣夫萬物自生也萬物自息也自行也自止也咸其所自取也誰為為之孰令聽之哉向之呺者有怒之者也天不言而成令也其誰為怒之者歟通云只一誰字問得口啞大知間間至大恐縵縵小知大知何紛紛也其言也猶噫氣也寐也覺也魂役形形役魂也搆者無有窮也綿綿如縵深深如窖擾擾矜矜日以憂懼謂之何哉通云忙作麼其發若機栝至莫使復陽也發若機栝迅不可止也留如詛盟守至勝也言其日消未能卒去也其胥溺也不可復也情已厭滿又加封焉有如溝洫難通濬也陽者生也陰者死也日趨於陰與死為近求其明晰豈可得哉通云一念不在如同死人喜怒哀樂至蒸成菌為慮為嘆為變為慹狀怒哀也為姚為佚為啓為態狀喜樂也情之遷也感物而動也倫伶雜奏出於虛也未若大音希聲也濕之蒸而為菌也菌不知晦朔也執情猶是也通云虛空裡釘將一橛日夜相代乎前至有情而無形胡然而生也若是者其所由以生乎彼我還相構也浸假而有物也浸假而有我也我與物為構物與我為構也我之取我近之矣而不知其誰為使也其有宰之者耶孰得其真耶孰得其朕耶愛惡相攻也是非相取也非是則莫與為行也其可行者斷然已信其有也特未見其形也其情耶其不及於形耶形易辨也情不易辨也旦暮以情遷也通云識情不斷華著身耳識情斷者華不著也百骸九竅六藏至無益損乎其真百骸並治也而不並為治也任之可也執之不可也得與不得皆溺情也真不受損真不受益也情之至者忘情者也通云倩女離魂誰是真者一受其成形至而人亦有不芒者乎相刃也相靡也日銷鑠於塵埃而莫能出也百年易盡也神銷鑠也非形銷鑠也通云赤肉團上有一無位真人切須好看夫隨其成心而師之至獨且奈何哉有心者不如其無心也是師心者也我師心人孰不師心乎豈必知代謝任取捨者有之乎愚者亦有之故人皆師心也無端而生心心成而生是非是以無有為有也今日適越昔先至焉是以無有為有也隨其成心而師之是以無有為有者也通云如龜有毛如兔有角夫言非吹也至其無辨乎言非吹也吹者無心而言者有心也言亦猶吹也吹萬不同而使其自已也因是也以為異於鷇音耶鳥之啄啄鵲之唶唶皆是也有音而無情也通云無語中有語有語中無語又云虛空講經水鳥樹林念法念佛道惡乎隱而有真僞至是其所非而非其所是八儒三墨何紛然其擾也道惡有異同耶目擊而存焉者道也任舉之可也有言可也忘言可也通云觸目不會道運足焉知路欲是其所非而非其所是則莫若以明有小知有大知有小明有大明不明於是非之非是非者不可以語天下之是非也僅明於是非之非是非者可以語是非於天下也能入乎物故物大而我小能出乎物故我大而物小也此之謂以明莫若以明通云難瞞明眼物無非彼至聖人不由而照之於天亦因是也有彼我有是非自見而已不見彼也自知而已不知彼也由彼成是因是生彼彼其所彼是其所是是方生之說也生必有死也生即為死也知生之無以異於死者知可之無以異於不可者也若是者齊也故聖人善用因也天者不可知者也通云門庭施設曲為今時是亦彼也至莫若以明因其所是而是之在我者無是也因其所非而非之在我者無非也彼且為彼是且為是莫得其偶虛之至也環中而應其應無端也通云大王來也萬福大王家中一片石雕得佛否得得莫不得否不得不得以指喻指至萬物一馬也以同乎物者喻之不若以異乎物者喻之之易也罕譬而喻也不獲已也夫物則安有同異哉天地一指也萬物一馬也喻指可也喻馬可也指非指也馬非馬也通云俱胝一指頭秪為承當不諦古人又道後園驢喫草可乎可不可乎不可至無成與毀復通為一生之無生也死之不死也美非美也惡非惡也大非大也小非小也然非然也不然非不然也可非可也不可非不可也成非成也毀非毀也復通為一故有時而言有時而不言也通云不別不同不一不異唯達者知通為一至因而不知其然謂之道不用而寓諸庸無用之用也無物不通無物不得善用因也是已語詞蓋曰因而已矣通云隨他去勞神明為一至亦因是也復通為一非勞神明以為一也勞神明以為一者不知其同者也凡物本同也名同也實同也喜同也怒同也同同也異同也朝四暮三名實未虧而喜怒為用者聖人善用因也可由而不可知也通云黃葉止啼喜怒為用聖人和之以是非而休乎天均是之為兩行聖人不由而照之於天無然不然無可不可也通云兩行者兼也通宗通塗挾帶挾路古之人其知有所至矣至而未始有是非也返於無物者上也有物而畛域不生猶無物也有畛域矣而異同不生猶無物也通云摘楊花摘楊花又云佯和子是非之彰也至故載之末年是非立而愛好於是乎生矣愛好之生也道之所以失也雖然無成與虧也庸詎知得之不為失也庸詎知失之不為得也忘情者道之至也鼓琴可也不鼓琴可也昭文鼓琴者也師曠惠子不鼓琴者也而三子並以知稱成亦虧也虧亦成也載之末年猶傳之歿世也通云一種沒絃琴唯師彈得妙問枝策謂倚杖據梧謂憑几是否答策以擊樂梧以造琴師曠審音無適而非樂擊策而已惠子超超一遑有琴理撫桐而已所謂不鼓琴者也唯其好之也至此之謂以明好猶愛也好之故欲其明之明之故欲其成之也而己異於彼矣夫孰使之自異乎哉同也自以為異也堅白異同好辨者也而適以昧終也其善辨者其昧終者也為之子者特以其緒終者也又其下也果且有成也歟哉非成也我不可成也非不成也物與我無成也滑疑之耀暗汶而耀於光明也昏昏滑滑疑以為未然矣而自他有耀也明之至也明之至者忘其明者也故曰不用而寓諸庸也通云夜半正明天曉不露問何為滑疑答百不知百不會今且有言乎此至則與彼無以異矣類與類為類不類與不類為類故不類者猶然類也謂與類異乎通云恁麼不恁麼總不得請嘗言之至而未知有無之果孰有孰無也未始有夫未始有始也言無始者詘矣未始有夫未始有無也言無無者詘矣以無有為無有耶其可言也耶其不可言也耶通云離四句絶百非請師明取西來意今我則已有謂矣至萬物與我為一小之未始非大也亡之未始非存也故天地可同而萬物可一也通云無邊剎澥不隔毫端十世古今不離當念既已為一矣至無適焉因是已有言可也無言可也以言顯言是支離其說也言與言為對猶一與一為對也是二之也因其有而無之未嘗有也因其無而有之未嘗非有也無適焉因是也通云萬法歸一一歸何處我在青州做領布衫重七斤夫道未始有封至此之謂葆光為是而有畛也各是其所是也八德者畛也議而不辨則無所用畛矣聖人者忘其辨者也辨者有不見者也大辨不言辨不及也滑疑之耀能葆光也注焉不見其裡酌焉不見其表也通云你有拄杖子與你拄杖子你無拄杖子奪你拄杖子堯問於舜吾欲伐宗膾胥敖至而況德之進乎日者乎宗小諸侯也膾小諸侯也胥敖小諸侯也蓬又其小也十日並出羿射其九一非不足也安用多乎堯難之而舜易之非舜之德進於堯也堯無可見之功舜有可見之德也通云大功不宰齧缺問於王倪曰子知物之所同是乎至庸詎知吾所謂不知之非知耶知者無知者也通云我到這裡卻不會且吾嘗試問乎汝至吾惡能知其辨衣牛以文繡牛惴惴恐奉十朋以金車不若放而浮之大澤也仁義是非何規規者哉通云烏龜向火齧缺曰子不知利害至而況利害之端乎水不能濡火不能熱風雷所不能迷登閶闔遊崑崙與西王母會於瑤池歌白雲而呼黃竹也秦穆公上天不知者以為死也穆公曰吾乃今而知廣樂之奏也通云鑊湯爐炭裡衆苦不能到瞿鵲子問於長梧子曰至吾子以為奚若去離塵埃而返冥極也無欲以觀其妙有欲以觀其竅通云無鬚鎖子兩頭搖是黃帝之所聽熒也至萬物盡然而以是相蘊黃帝乘風崆峒論道至矣而黃帝猶聽熒也智不及也且子過矣且子過矣見卵求雞見彈求梟是計之早者也道不可言也道不可名也妄言之妄聽之苟如是而已也奚為其旁日月乎奚為其挾宇宙乎其吻合者為之可也其滑昏者置之可也而萬物已隸於我矣我犬而物小我重而物輕我貴而物賤也隸之故尊之也以隸相尊也物無不大故物無不小物無不重故物無不輕物無不貴故物無不賤也衆人役役用智也聖人愚芚不用智也參萬歲而一成純去來無所殊也玄黃不能雜也以是相蘊萬物之大始也通云大千壞時這個不壞子惡乎知悅生之非惑耶至不悔其始之蘄生乎人以死為死鬼以生為死人以生為生鬼以死為生故死生旦暮相代也況夫賤者之至於榮榮者之至於賤乎通云火後一莖茆夢飲酒者旦而哭泣至旦暮遇之也君乎牧乎謂占夢也維熊維羆維隼維魚占君事也占牧事也覺而後知其夢也其無所用占矣通夢覺也一死生也齊是非忘得喪也聖人也百世之後而一遇之猶旦暮也若是其不可幾也弔至也詭異也言至異也通云仰山原夢猶較些子既使我與若辨矣至而待彼也耶其有定耶其無定耶此亦一是非彼亦一是非也而又誰待耶其待彼耶彼者不可知者也我與若與人俱不能知矣而彼獨能知耶通云鬍張三黑李四何謂和之以天倪至寓諸無竟是與不是然與不然相待也猶化與聲相待也春至而倉庚鳴雷始收而蟄蟲蚽戶化與聲待也然亦有不相待者十有二月而螽矣李梅實矣鸚鵒來矣和以天倪因以曼衍所以忘年也窮無窮極無極故無竟也不用而寓諸庸故寓無竟也通云兩個泥牛鬥入澥直至如今沒消息罔兩問景曰至烏識所以不然影待於形也形待於所以形者也蛇之蚹也蜩之翼也其形形也而所以形者未嘗形也烏識所以然哉烏識所以不然哉見影而馳何乃為翼跗使也通云逐塊韓盧不少問影待形形待心心是主人公耶答心如工伎見意如和伎者無量劫來生死本癡人喚作本來人莫認奴作郎好昔者莊周夢為胡蝶至此之謂物化莊周耶胡蝶耶齊之不得而齊別之不得而別也是兩行也兩行者物化者也吾喪我故物化也通云山前一頭水牯牛上書溈山僧靈祐王老師異類中行曹山披毛帶角養生主知生之生不知不生之生也所生者死矣而生生者未嘗死也出者奴之入者主之也通云但能相續名主中主吾生也有涯至殆而已矣生有盡而智無窮也達生之情者忘其生者也去智與故委然任運而忽然若遺也豈能以形骸之逐逐從情智之紛紛哉通云聖人若知即同凡夫為善無近名至可以盡年無慕乎善而為之無慮乎惡而不為也名乎刑乎吾知遠矣督者形之會也治乎其總立乎其元經緯萬變是道樞也親全而生之子全而歸之通云不思善不思惡正恁麼時如何是明上座本來面目又云曹山正命食惟除此人不橫死問長子為家督是否答譬之人身有任有督處尊面率下也公文軒見右師而驚至天也非人也右師肘而廢矣然以廢得全是得全於天也得全於天者人損不能入也介獨也兩相與謂之與通云風吹柳絮毛毬走澤雉十步一啄至神雖王不善也是以天下為桎梏也通云披枷帶鎖老聃死至古者謂是帝之縣解不蘄言而言不蘄哭而哭猶未離乎情也倍情者也生寄也死歸也委然任之猶尸解也哀樂入其中而形已悴矣是天刑也通云勞生惜死辦愚癡齊騎牛老翁未免遭人一棒指窮於為薪至不知其盡也薪有盡火無盡薪可指火不可指也夫火之傳火也則安有極哉生猶是也故有涯者無涯者也通云譬如一燈傳百千燈人間世寓跡宇宙之間蕩精塵埃之表豈必矯世離俗卻形全身哉任運不失其和在群彌見其獨翕而逾張隱而逾耀也通云隨順世緣無罣礙涅槃生死等空花是張拙語顏回見仲尼請行至庶幾其國有瘳乎靈耶出耶莊耶回未嘗適衛也謂之適衛可也以國量乎澤形骸蔽川原也若蕉猶草菅也通云拈來莖草仲尼曰嘻若殆往而刑耳至若殆為人菑暴君者急掩其暴者也以美好加之而反惡矣交不充也志未豫也雖存其信未達其神雖曰不爭未達其心通云爭怪得夫且苟為悅賢而惡不肖至必死於暴人之前矣詔猶告也無詔則已若將詔之是適與為搆也進言者不易也目將熒而且懼也色將平而且下也口將營而囁嚅也容將形而悴厲也心且慮其成且慮其不成也進言者不易也以水濟水以火濟火同也非和也順此無窮也患自此始也厚言重言也不信而以重言入之是與怨搆也通云死在句下且昔者桀殺關龍逢至而況若乎桀紂惡豫其名堯禹好求其實是故名實者天下之所爭也通云二俱不免雖然若必有以也至嘗以語我來何其處也必有與也通云道且一語看顏回曰端而虛至其庸詎可乎充孔揚者德張施也采色不定猶未離乎德色也是能為陽者也但可使恆人不違耳而遂欲案人之所感乎因以容與其心乎所感者無方而案人者有量以有量逐無方我知其不可也能及其外不及其內也外合也而內不訾也內不自以為訾未能降心以相及也可哉通云且喜沒交涉然則我內直而外曲至若是則可乎回之言曰吾內泯其狂聖之情外形其拳曲之節則古稱先可以告無罪乎雖然未可也通云入泥入水問何謂成而上比答謂上比古人也問何謂蘄乎而善蘄乎而不善答豈有所蘄乎而人善之豈有所蘄乎而人不善之耶善不善非有所向也問何謂教謫之術答謫猶謫也雖行教謫然或引古訓以式之喻古事以明之言者無罪聞者足戒也仲尼曰惡惡可至猶師心者也所與言者皆政法也而不類乎褻諜之私也雖鄙固乎亦可以無罪矣雖然猶師心者也成乎心而師之也烏可以及化也通云才到潼關漫求帝主顏回曰吾無以進矣至皞天不宜易治也有而為之欲以有為治之也若是者人事也非天事也故皞天不宜也皞猶呼也通云虛空漫勞摩撮回之家貧至心者虛齊也聽者耳事也聽之以虛非耳事也氣不自為聽也氣自為聽也以耳聽乎以氣聽乎通云聲不住耳顏回曰回之未知得使至可謂虛乎其始也適己之適故得己其後也忘其為適故喪己通云貧無立錐夫子曰盡矣至一宅而寓於不得已則幾矣感於其名則已淺矣名之無可名也故無感其名未嘗入也未嘗不入也鳴無聲也止無跡也無門則絶去來無毒則損情故通云東瓜茄子絶跡易無行地難為人使易以僞為天使難以僞不見其行者而已行矣無行地也息之深深則絶跡通云東山水上行聞以有翼飛者矣至未聞以無知知者也是殆不可以知知也通云木馬嘶風泥牛吼月瞻彼闋者至是之謂坐馳闋滿也極也虛室則庭無人白者一色光熙緝也動與吉會故無適不臧止而又止協於一也此之不止是謂坐馳通云飛光左右夫徇耳目內通而外於心知至而況散焉者乎收視返聽故徇耳目止於符故內通外於心知則非思慮所及絶形骸離神智豈猶區域之觀哉古帝皇王猶待命也況其下乎几蘧古帝名通云毗盧有師法身有主葉公子高至子其有以語我來不急謂慢然應之而無當也歡成合成也寡不道以歡成謂鮮有不道而能合成者也人道之患患及於世陰陽之患患及於身執粗櫔不求臧美嗜欲寡也釜爨之人無畏熱苦突不黔也清冷也朝受命夕飲冰我豈內熱歟不然何以寒自苦也國人望君如望歲焉國人望君如望慈父母焉何子子也通云膠盆刺腦仲尼曰天下有大戒二至夫子其行可矣任運而已哀樂不得而入也通云子順父臣奉君丘請復以所聞至孰知其所終莫者不可知者也信不信未可知也而殃已相及矣故傳言者危多奇巧則以巧喪德多奇樂則以樂敗行忿之設也必無由也由於巧言由於偏辭者也譬之鹿死不擇音矣忿情之激茀然作氣厲與厲搆凶患隨之我不知其胡底也通云苦故法言曰無遷令無勸成至此其難者已令而遷之未成而勸之皆過其量以求益也幾幾乎危事也美不易成也成之在久惡易成也一成而不可改也故危事也至人者任天而遊而一應乎不得已施也不求報也致命而已吾為其所難也易曰致命遂志又曰外其身而身存通云抑已而已未聞得已不已顏闔將傅衛靈公太子至達之入於無疵蒯聵者不有其父不有其子可不謂暴人耶天殺謂天資刻薄也形就而入則己昵心和而出則己陽與為嬰兒與為無可畦與為無崖惟其達之故入無疵也通云共汝顛倒一上汝不知夫螳蜋乎至而美者以犯之幾矣積有功伐而自以為美也才之美也不知其犯也犯之幾也居東是也明農是也通云車不橫推理無曲斷汝不知夫養虎至可不慎耶韓子曰無批逆麟龍不易擾也虎馬同喻也養已者媚之否則殺之順逆異也蜄土器也以筐以蜄奉之至矣蚊虻適集其僕緣而拊之偶不以時怒有所騁甚殆事也通云虎缺馬馵匠石之齊至不亦遠乎轅可曲耶廣莫之野耶櫟之為散木也匠之為散人也其相去亦無間矣而匠石者故為此呶呶也幾何不為木所笑也弟子曰彼為社者也非無用也若其無用社者何也趣取猶趣使也匠石曰彼有托而逃也寄也名之為社是誶之也不知己者也詘於不知己伸於知己彼大木者胡不幸耶且彼亦安用社即不為社寧受伐耶彼以不材終其天年其所保者與庸衆異而乃以義譽之耶譽之是誶之也木不受也通云莫塗污好問液樠答樞腐則液流而木為屑樠滿也問密失無言答不務速說南伯子綦遊乎商之丘至所以為大祥也藾猶蔭也其蔭可以芘千駟也荊氏善産然不如商丘杙猿猴所棲以為戲也麗屋棟材也廣廈麗之故名麗樿傍櫬一邊也櫬用全木厚殮親也解賽祭也適河沈人於河如西門豹事牛白顙豚亢鼻人痔病猶木以不材棄之也不祥者所以為大祥也神人以之通云死貓頭支離疏者至支離其德者乎會合也撮髮為髻五管五藏之俞也針者縫人之具又可以刺繲謂浣衣也入學者鼓策備樂舞也播精謂吹播精食其值皆可以食十人言無廢任也攘臂求為可用也役則不及賞則及之故支離者勝也通云三種病人莫教錯過孔子適楚至莫知無用之用也迷陽言用晦也知雄守雌知白守黑也卻曲謂卻行而不前也通云老僧今日失利德充符大德不德其充然者符契而已通云色見聲求是行邪道魯有兀者王駘至丘將引天下而從之難為王駘難為孔子通云兩個沒鼻孔漢問立不教坐不議答立非立也何教之有坐非坐也何議之有向四威儀中覓貧道耶常季曰彼兀者也至命物之化而守其宗也無假猶無待也不物於物故不與物遷終萬物始萬物故命物之化通云本末須歸宗問王先生林作王天下之王劉作王駘之王孰是答王者往也謂先生往從之也故大遠於衆也常季曰何謂也至視喪其足猶遺土也一可異也肝與膽隔壤也異可一也物與我同倫也無宜故無不宜也奚其不喪奚其喪通云木人嶺上穿雲過常季曰彼為己以其知至物何為最之哉以其知猶未離乎知也以其心猶未離乎心也介然者知介然者心故為萬物最也最謂出其上也心與物辨非常心也苟得其常奚為最哉通云平常心是道仲尼曰人莫鑑於流水至幸能正生以正衆生群然者木而松柏異群然者人而舜異我生正則群生正故嗒然忘化而與運齊也安汝止協乎一通云滅度一切衆生而實無一衆生得滅度者非衆生非不衆生夫保始之徵至彼且何肯以物為事乎保始保其泰始也徵效也不懼之實大勇也求名者且然矣況太上乎無知故無不知未嘗生故未嘗死登假謂仙去猶黃帝乘龍也擇日者無擇者也人則從彼矣彼何嘗以物為事哉通云普化木鐸申徒嘉兀者也至子齊執政乎王曰蠋前蠋亦曰王前執政大兀大通云探竿影草申徒嘉曰先生之門至不亦過乎奈何哉遊先生之門也子以執政先人而不知其後人也且子過矣通云不妨減人身價子産曰子既若是矣至子無乃稱與堯爭善猶未忘乎善也狀其過不狀其過言憾物者恆多而自謫者恆寡也安之若命則固然矣羿之彀中不死者無幾然不死者命也天下之大危害之積非獨一羿而已入其中而得出者利害釋於前死生不攖其慮也伯昏無人況我以善者也遊十九年而形骸化矣吾與子遇於形骸之外而子猶索我於形骸之內乎子産曰先生起自贊也通云大好一期賓主魯有兀者叔山無趾至而況全德之人乎尊足謂尊於足也有大於身者也通云見吾色身不見吾法身無趾語老聃至天刑之安可解賓賓者何為耶其名耶其適以自苦耶天刑之也天刑之也聃也遁天之刑者也丘也天刑也通云項上鐵枷何時脫卻魯哀公問於仲尼曰至是何人者也善惡者離乎形者也為後而不為先能為和不能為倡也月滿曰望望人之腹腹果然也列子曰雌雄在前孳尾成群謂入獸不亂群入鳥不亂行也寡人醜乎是使我形穢也通云六根不具七識不全始解親近又云一人通身紅爛在荊棘中仲尼曰丘也嘗使於楚至才全而德不形者也肫母死而猶食之不知其死也食乳也已知其死則去之矣去之者惡之也惡其不見己也惡其不為類也毋形猶在而母非母也母去之也翣者喪具用以飾武敗者無所用之履以飾足刖者無所用之無共本也諸御不剪爪不穿耳不欲使形不全也新有昏者雖在外期年不使愛其生也哀駘它者人也而進於天者也不以形形而以不形形者也通云金香爐下鐵崑崙哀公曰何謂才全至是之謂才全遇不可知也事之變也知不能規乎其始也烏識其所以然哉烏識其所以不然哉安之若命哀樂不能入也兌和悅也無伐天和四時容與故與物為春也通云焰裡寒冰楊花九月何謂德不形至德友而已矣停者止也畜也物取平焉故可以為法也成和不滑和也通云急水上打毬子闉跂支離無脤至獨成其天脰脛項也肩肩直而無文也惡者美之美者惡之故視全人反怪其項背也忘其所忘非能忘者也忘其所不忘斯能為忘者也惟聖人能也無所用知也無所用約也德惡其出於己也貨惡其出於地也若是者天也鬻之自天者食之自天者也不大棄則不大豫不大豫則不大施也有人之形無人之情人也而進乎天者也通云無手人行拳無舌人解語惠子謂莊子曰人故無情乎至子以堅白鳴求益乎有生之外是益生也不益生謂不多事以擾其生也生無生也道與之貌天與之形因天地之自然而我不寄故生無生也倚樹據梧此可謂適矣雖然猶有待也無生者無待者也天選子之形形者神之府也而子以堅白異同鳴天下哉其得全於天哉其不得全於天哉通云放汝三十棒大宗師生無生也死不死也我忘物也物忘我也宗者極也統也會也天師道道師自然自然者無師者也大無外也通云此宗無語句知天之所為至所謂人之非天乎天亦人也人亦天也所知者人也所不知者天也以其所知養其所不知知之至也夫知有待也不知者無待者也通云明日不得普請且有真人而後有真知至於道也若此在寡且不逆也不以成自雄也於士無取舍也不暮謀故無取舍無適也無不適也無過也無當也是登假於道也通云平高就下古之真人其寢不夢至其嗜欲深者其天機淺其息深深故息以踵言若哇者息以喉其嗌言其喉息也通云著甚死急鼓粥飯氣古之真人不知說生至是之謂真人不出故出不訴不入故入不距莫知其始也莫知其終也坦然受之故喜釋然忘之故復道本自遺豈勞心以損道天非有耦奚假人以助天通云無去無來亦無住若然者其心志至而不自適其適者也兵非以為勇也澤非以為愛也無所為而為也莫之至而至也非聖人也非仁人也非賢人也非君子也非士也非役人也智之無可智愚之無可愚貴之無可貴賤之無可賤也通於物者和樂也無適而不親也凄似秋暖似春者時也忘利害故利害不通也損己以行其名也亡身之不恤不擇真而任之也是至人也非然者尊己卑物遺世厲俗何為也通云渠無面目問何為其心志其容寂其顙沫答心非木石故志容不景耀故寂顙髏稿枯故沫古之真人其狀義而不朋至是之謂真人狀義而不名為義也與人伍而不取其同也無不足也不相承也隨器故絶方員渺形故無華實邴邴喜貌喜非喜也崔嶽嶽也得已而不已也滀止也其止進也與進也其進止也其與世並厲乎其謷然高往乎連卷乎不得而入也悗悗乎默而不言也寬然者其殺也乃乃然與世俱也感而應無廢事也相與有足者蹈於高丘陟崑崙遊廣莫耶非夫有所慮而為之非夫有所避而不為者也而人遂以為勤行也過矣過矣非一也非不一也好之也一也不好之也一也其一也一也不一也一也天耶人耶吾不得而名也通云前三三後三三死生命也至一化之所待乎死生旦暮也人不得而與也是物之恆情也越死生謂之卓離死生謂之真身可愛也命可致也愛身故孝於親而況其進者乎致身故忠於君而況其進者乎忘於江湖忘於道德堯與桀兩忘也善吾生故善吾死也壑可藏舟也壑非壑也澤可藏山也澤非澤也有負之而趨者人不知也人知大之藏小而不知小之藏大也人知有之遁無而不知無之遁有也有而適無無而適有來而適往往而適來死死生生皆遁也藏天下於天下安所遁哉人也猶其為物也化余為魚魚樂也化余為鳥鳥樂也形盡寓也寓何所不樂哉彭可也殤可也存可也亡可也無始無終故一存而不喪也萬化之所宗而一化之所待也通云王老師賣身去夫道有情有信至比於列星疑有也有情有信者也疑無也無為無形者也可傳耶不可傳耶可得耶不可得耶鬼耶帝耶天耶地耶非道無以神非道無以生耶上下四方推之而準故一之者極六之者極也天地者大氣舉之故稱氣母維地軸也斗天樞也堪壞獸形人面以神得名也馮夷河伯也肩吾梁父之貴神也黃帝升鼎騎雲氣上蒼天顓頊冬帝御玄堂北極出天二億三萬有奇禺強履其上西王母宴穆滿於瑤池蓋少廣也五伯商五伯豕韋等是也東維漢津以東也通云乾峰柱杖子南伯子葵問乎女偊曰至參寥聞之疑始外天下而後外物外物而後外生外生而後朝徹由外而內由遠而近也不見天下不見物不見己故無今無古無生無不生也將之不得也迎之不得也毀之不得也成之不得也可將也可迎也可毀也可成也攖之而無不寧也感物而應未嘗動也副墨疑可見也雒誦疑可聞也瞻明猶未離乎目也聶許猶未離乎耳也需役未離乎動者也於謳未離乎言者也玄冥莫也冥冥故莫也參寥獨也寥寥故獨也疑自此始也無始故疑始疑始故無始也通云不是心不是佛不是物問何謂有聖人之道無聖人之才有聖人之才無聖人之用答秪得其體不得其用秪得其用不得其體問何謂殺生者不死答護生須用殺問何謂攖寧答只在六根門頭卻不被他污染子祀子與子犁子來至成然寐蘧然覺死生存亡一體也何為是拘拘者哉曲僂佝僂也背高故五俞在上句贅頂椎也陰陽之氣雖有沴乎其心乃閒然無事者也跰躚而行心閒然無事也臂之左可為雞也臂之右可為彈也尻可為輪也神可為馬也然則吾何擇哉吾安往不適哉叱避謂叱之使避也無怛化無以死傷生使彼化者增忉怛也鼠肝耶蟲臂耶魂氣則無不之也無不之也骨肉復歸於土命也善吾生善吾死故生有所不欣而死有所不恤也人可也物可也鼠有大於肝蟲有大於臂也生死寐覺也通云回途別著破襴衫問不能自解物有結之六解一亡與楞嚴同義否答云是子桑戶孟子反子琴張至天之小人也相與於無相與相為於無相為人也而天者也臨尸而哭是也猗語辭人死則化為異物有情無情吾同體也故曰假於異物托於同體戮民猶天刑也有事無事無事有事故常在定疇於天侔於天進人而天者也天之君子也通云不借借問何謂莫然有問答莫然忽然也有間猶頃之也顏回問仲尼曰孟孫才其母死至乃入於寥天一簡謂忽然若遺也死者化物也使死而有知也豈猶待夫不知之化者哉不知之化謂後死者也且生與死各不相及也各不相知也方將化矣惡知不化者哉方將不化矣惡知已化者哉死生夢覺也何為是規規者哉矧吾與汝皆夢也夢未覺者也彼死者形可駭而心無損也旦易其宅而情非死也孟孫氏覺者也人哭亦哭是其所以宜也乃宜也吾者從我得稱也執形而命之曰吾遂相與吾之耳矣雖然吾得我哉我喪我哉浸假而我化為鳥鳥一我也浸假而我化為魚魚一我也我無定屬我有定稱哉生耶死耶覺耶夢耶物耶我耶未知其誰適也歌者何也哭者何也所造無非適也不假笑也有時獻笑喜與意俱也輾然可也排之不得也安其排故不及排去其化故忘於化乃入於寥廓之區與天一也通云曹山孝滿意而子見許由至此所遊已軹猶只也躬仁義適以仁義黥汝也明是非適以是非劓汝也無莊以美故失其美據梁以力故失其力黃帝以知故忘其知爐錘者未可少也息我黥補我劓冥乎仁義是非之藩而起化埋也吾何為不可哉許由曰是也此天遊也通云紅爐大冶問何為秉成答成者已然者也因其已然謂之乘成顏回曰回益矣至丘也請從而後也冥情故絶好任運故不常同者冥情者也化者任運者也墮肢體黜聰明回殆庶矣通云絶後再蘇問林以坐忘為面壁是否答曰瞌睡漢子輿與子桑友至然而至此極者命也夫貧也非病也安之若命哀樂不入也通云不妨疑著應帝王有道本有化跡帝王者跡也所以應之者本也通云苔生玉殿齧缺問於王倪至行以告蒲衣子胡然而問也胡然而不知也相與於無相與也喜也必有以也通云一場懡㦬蒲衣子曰乃今知之乎至而未始入於非人與為馬耶與為牛耶與造物者遊耶去智與故以情信之德任真而不任僞也不出也不入也其人耶其非人耶通云披毛戴角是類墮肩吾見狂接輿至而曾二蟲之無知告我語我來也以經為式以義為度所謂以治治之者也以治治之未若以不治治之也聖人之治之也治內而已豈治外乎無乎不正故無乎不行也盡矣通云牛胃中經冬過夏天根遊於殷陽至天下治矣厭足也何帠一作何故一作何為余曰帠猶係也去矣天根無落吾事通云我不暇為汝說陽子居見老聃至如是者可此明王乎質敏故所嚮疾氣剛故能強梁心開故物徹而疏明志專故學道不倦此恆人之見多而至人之見少也通云有多少伎倆老聃曰是於聖人也至如是者可比明王乎胥賤役也技者藝能之末係纍也勞形沐心徒自苦也田佃也便捷也犛猶狸也他他藉藉獵者衆也虎豹之文猿狙之捷皆以技係功高者狗也執犛而歸往就烹鼎則何為者也此而云聖人乎通云死漢陽子居蹴然曰至遊於無有者也擊壤而歌何也通云當時但展兩手鄭有神巫曰季咸至嘗試與來以豫示之鄭人怪之故棄而走既其文未既其實抑未知其誠然否也卵者物之始形者也知其雄守其雌無名無形何卵之有列子者以道自豐而欲使人必信己也宜使人得而相之也相視也通云洞山土地三十年不見洞山明日列子與之見壺子至因以為波流故逃也濕灰委灰也地不無文順地也頽然不震雜然不正亡名亡德窟於委灰是杜德也權用也杜權未杜德也權杜而實不杜也故易見也天壤天區也發於踵非息於踵也故其善猶見也不齊謂不定不動也太空沖然物莫能勝故視之不齊也衡者平之機也與為高與為下故不齊也審瀋也沫也一曰水停為審緩而詳也鯢桓魚所盤曲也淵有九此處三焉其息深也虛而委蛇莫知誰何而始惝然失也示之以宗也宗者極也返其宜也通云國師在三藏眼睛裡然後列子自以為未始學至一以是終豕人也人豕也人立而啼者豕也忘乎物故一之也遺事故不親事紛然者應量之跡而抱蜀者自封也一以是終故莫知其終也通云孛荷孛荷又云苕帚糞箕無為名尸至故能勝物而不殤不以名也不以謀也不以事也不以知也如鏡照物虛之至也夫鏡何有哉通云打破鏡來與汝相見南海之帝為倏至七日而渾沌死將欲剖吾朴也不知其喪吾榖也谷神不死通云鑿開五位裂破三玄是死句不是活句
