body:
  text: 雲溪俍亭道人淨挺著宛陵愚山居士施閏章閲田子方形解而不欲動也口鉗而不欲言也目擊道存也不知其所以然也交臂而失也始終相反乎無端也死生不入於心也釣莫釣也不射之射也得失非我也其亡也存也存也亡也通云懷州牛喫禾益州馬腹脹田子方侍坐至夫魏真為我纍耳清而不礉故容衆正容悟物而使人意消也此全德也通云心欲緣而意忘口欲談而詞喪溫伯雪子適齊至亦不可以容聲矣振起也似子親也似父尊也歎者何也不言者何也通云兩眼對兩眼顏淵問於仲尼至吾有不忘者存心死可哀也人死次也比方嚮方也日出則存日入則忘盡然也莫知其所終而薰然者成形也雖知命者莫規其所始也丘是以日徂也徂往也化也奈何哉女交臂而失也女徒見吾所以見也著見也在彼者已盡矣而女求之於形有也是馬逸足而求諸五達之肆也吾服女者以甚忘也女服吾者亦以甚忘也奈何其不忘也雖然女奚患也吾有新有故故吾雖謝而新新者日存也毋乃交臂而失也通云刻舟求劍問故吾答第二月問不忘著存答老僧看他有分孔子見老聃至吾不知天地之大全也慹然執心不動也辟焉猶辟咡也不疾易謂不數易也隸賤役也為道者解乎此可為知者道也孰能說焉謂言說所不逮也汋猶勺也通云夾山雒浦莊子見魯哀公至可謂多乎緩謂裒然寬大也通云不道無禪卻是無師百里奚爵祿不入於心至是真畫者也儃儃然忘之至也贏猶裸也通云芭蕉泉大道文王觀於臧至彼直以循斯須也其釣也不為釣也非持其釣而後有釣也蓋常釣也𩑺髯也偏朱蹄馬蹄半赤也偏令謂偏小之令也斔庾也終身無聞丈人自此遠也忘是非故論刺莫及也循民俗於斯須者用也通云止啼黃葉列禦寇為伯昏無人射至於中也殆也夫盈貫溢鏑也措杯肘上肘如稿枝也矢適發者與前矢沓矢方發者復寓其間謂連珠矢也象人土木偶也是猶以射射也非以不射射也足二分垂外履至虛也眴目目瞬也通云看箭肩吾問於孫叔敖至既以與人己愈有智者不得說則忘辨美人不得濫則忘淫盜人不得劫則忘利介隔也與人而已愈有施不匱也通云不聞爛壞虛空楚王與凡君坐至則凡未始忘而楚未始存也凡君樊君也通云一得一失知北遊知者不言言者不知也媒媒晦晦無心而不可與謀也彼何人者也夫道窅然難言也辨不若默聞不若塞也道無所不在也所以論道而非道也道無問問無應也有乎其無有乎假不用以得其用者乎無不用者乎未有天地其可知者乎安化乎安不化乎通云直得火爐震動又云藏頭白海頭黑知北遊於玄水之上至以黃帝為知言不知者是也忘之者似之者也知之者終不近也故知者不言言者不知也通云晏坐巖中善說般若天地有大美而不言至可以觀於天矣至精者與彼百化也死生方圓莫知其所始也扁然而萬物固存也六合非巨也秋毫非小也或沈或浮與化俱新也可以觀於天也通云猿抱子歸鳥銜花落齧缺問道於被衣至彼何人哉相與於無相與通云賓主死然問不以故相持答新新不已問實知答惟此一事實舜問乎丞曰道可得而有乎至又胡可得而有耶委棄也形委也和委也順委也蛻亦委也疆陽猶運動也通云隱峰捏怪龐婆捏怪孔子問於老聃至此其道歟崖略猶郛廓也邀遊也恂實也達通也斷棄也不以知為博不以慧為辨也君子之道又其外焉者也通云荷澤一宗猶在中國有人焉非陰非陽至此之謂大得非陰也非陽也處天地之間猶寄也必將反於宗也宗本也由本觀之生者物之喑醷者也喑者聲不和醷者味失正也醷梅漿也死生旦暮也堯與桀徒相非也人猶果蓏也有情者猶其無情者也泊然相遭也漫然相遇也駒過卻也出也天遊入也物化也韜櫜也袟囊也解其韜墮其袟乃大歸也形與不形人所共喻非將至於道者之所期也至道者不論論道者不至也明與見所不能值也故不如其默也故不如其塞也通云見猶離見見不能及又云掩耳而退東郭子問於莊子至彼為積散非積散也道惡可期也期之則螻蟻也稊稗也瓦甓也屎溺也任所期也正獲臧獲也監市市司也豨豕也市司履豕而知其肥瘠也賤事也愈況而每下也莫可必也物無所逃也周也遍也咸也一而三三而一也間閒也寥已謂寂寥而已也往者無所去來者無所駐也馮閎大也彼大智者猶不知其所窮也不際之際際之不際者也故無際也吾無以測之也通云墻壁瓦礫又云乾矢橛婀荷甘與神農同學至所以論道而非道也奓戶開戶也生者無所發其狂言死者藏其狂言有言者不如其無言也通云合笑不合哭又云棒打青天于是泰清問乎無窮至不遊乎太虛無問問之默然問也無應應之默然應也通云笊籬木杓又云二俱瞎漢光耀問乎無有曰至何從至此哉光耀無有而未能無無也若果無有也則何為至此哉故既不無無亦不無有也通云有無二邊無復餘習大馬之捶鉤至物孰不資焉者捶鍛也鉤劍類無所不用故無所可用也通云有用有置又云大用現前不存軌則冉求問於仲尼至亦乃取於是者也未有天地可知耶其不可知耶昭然者知也神受之也昧然者不知也且又為不神耶無古今也無終始也未有孫子而有孫子也其可知也耶其不可知也耶無務速說也毋以生生其死也毋以死死其生也死生相待也先天地而生者非物也若猶有物是物出也不能為物先也猶其有物而有己也嬗代無窮也彼役役於聖人者其愛人無己也毋乃取於是也我不願為聖人也通云這奴見婢子顏淵問乎仲尼至齊知之所知則淺夫外化而內不化猶不化也內化而外不化猶不化也胡化乎胡不化乎胡與物相靡乎必也與相靡也多莫甚也囿也圃也宮也室也古之人猶未免也儒墨相師也外化而內不化也哀樂之來無端也死生逆旅也窮於所知窮於所能雖聖人不免也吾未能免其所不免也至言去言也至為去為也通云三世諸佛不知有又云聖人若知即同凡夫凡夫不知即同聖人庚桑楚鳥獸不厭高魚鱉不厭深也全汝形抱汝生母使汝思慮營營胡規規然若喪父母揭竿而求諸海也津津乎猶有惡也與物委蛇而同其波是衛生之經也靈臺者持而不可持者也以有形者象無形者而定矣孰知有無死生之一者吾與之為友也通云五臺山上雲蒸飯十字街頭狗矢天幡竿頭上煎鎚子三箇猢猻夜簸錢老聃之役至人與人相食者也穰歲豐也杓斗柄也函車猶專車也二子謂堯舜也民之攘利也急矣有弒父者有弒君者晝為盜日中穴壞貪利使之也壞垣墻也功成事遂而百姓皆謂我自爾此老聃之言也通云一棒打殺南榮趎蹙然正坐至子胡不南見老子形非有異也胡不自見胡不自聞胡不自得也辟開也形未嘗閉而物或間之遂不相得也奈何哉全形而抱生也勉聞命矣達於耳未達於心也辭盡謂盡之也藿蠋藿中蟲也越雞小魯雞大也通云高安大愚為汝說破南榮趎贏糧至反汝情性而無由入可憐哉子何與人偕來之衆也非愚則狂也忘其答因失其問也朱愚猶侏愚也通云穿過髑髏南榮趎請入就舍至而況放道而行者乎誰哉鬱鬱乎徒自苦也韄者鞏用草也揵鍵也外繁蕪故治其內內繆亂復治其外內外交治形神攝矣然未能淡忘也非道德之正也又況乎規規焉奉道而行而以道為的也通云內不放出外不放入是生死岸邊事南榮趎曰里人有病至衛生之經已能言病猶未病也飲藥以加病則逾病也手攣急也共其德謂一而不分也瞚瞬也視不淫故不偏外也通云如世嬰兒五相完具南榮趎曰然則是至人之德己乎至謂之天子水解凍釋化矣而未底於化也未可謂至也宇泰定而發光虛室生白也人見其人曉然與天下見也修心有常也人舍之謂人歸之也助祐也通云冰消瓦解又云修證則不無污染則不得學者學其所不能學也至然後能獨行止乎其所不能知之至也不然者天鈞敗也不善之來未有已也吾徒順之勿以干其神志也神明者雖有持之而不知其所持者則善持者也未嘗實有諸己俄而發發每不當己入而不能捨每變而愈失也通云閻羅王來拿我又云快活券內者行乎無名至聖人藏乎是符於內者無為者也無為故無名而用有光也符於外者有為者也有為是期費也炫然在外者市人也跂踵也跡也人見其跡則魁然大也與物有窮故物得而入也若夫與物為無窮者豫乎且乎物莫能入也忘身也忘人也故無親也所不得而親所不得而疏也人之盡也故有心者陰陽害之也道之為道通乎其分也通乎其合也成毀一也備守也畏也分之則各為備備之則有以備也死生非異也苟出而不反焉則見其為鬼矣苟出而得其是焉則謂之得死所矣入滅者非滅也有其實也鬼之一也一以為鬼一以為非鬼也有形者生無形者死也以有形象無形而死生一矣定齊也一也非出也非入也無處也無本也無剽也有所出而無竅者是之謂有實也上下四方非上下四方也往來今古非往來今古也萬物出乎無有而無有一無有也無無亦無也通云碗子撲落地碟子成七片又云路逢死蛇莫打殺沒底籃子盛將歸古之人其知有所至矣至是蜩與鷽鳩同於同也著謂著姓也昭景之後其著者為戴姓甲氏之後其著者為封姓皆楚之公族而姓氏則有分矣言吹萬不同而死生異量也所謂移是者也黬突中塵也有生者一塵也紛然曰移是則移是矣是殆非言之所及也不可知者也譬祭者之受胙也或有膍也或有胲也不可知者也膍百葉胲蹄也太牢之分體也合而分分而合也散亦分也譬觀室者既周於寢廟矣又觀其偃息焉偃也則必有異乎寢也然莫非室也皆移是也是也者以生為本以知為師也因是則有非矣相乘者也其果有名實耶以己為質執之以為固然也節而信之死不可易也知愚名辱因其所是而是焉者也徹通也今之人比比也蜩與鷽鳩類也通云東家作驢西家作馬問戴一作擁戴封一作封守是否答姓氏為確蹍市人之足至聖人之道蹍失足而履其足也於市人則為遜辭兄則近於質矣大親則忘之也故至禮者忘乎人者也至仁無親也辟金言不以金為質也生本無知也知其後焉者也知者之所不知其猶未免於睥睨也德者在我者也治者在人者也工乎天俍乎人則聖人也懵然者蟲也懵然者天也全人惡天非惡天也惡其人之天也況乎天人合也籠者有心於得也畫華飾之服拸棄也介者毀形無所用其華飾也遊毀譽之外也胥靡賤也復摺猶往來也與人往來而不以餽遺為禮者是忘人者也忘人者天人也通云似牛無角似兔有角徐無鬼夫神者好和而惡姦者也為天下者亦若是則已矣囿於物則否也是其所是果孰是耶久矣乎吾無與言也不聞也無不聞也不見也無不見也無以色驕人也其誰知之其誰鬻之也真人者抱德煬和以順天下者也以天待人不以人入天也其解之也似不解也其知之也似不知也不可以有崖不可以無崖也通云百歲老翁失卻父徐無鬼因女商見魏武侯至君將惡乎用夫偃兵哉我以君為勞苦矣君乃以我為勞苦耶掔去也執飽所執在一飽也視日者蒿目而視情至專也忘其一者淡忘也喪其一猶亡其一也金版金匱之書也流人亡人也藜藋柱徑草參天也踉足跡也虛無人故位其空也跫然足音也神不自許則神之尊者無幾矣君病矣其病者何也美惡相因也故美者惡器也形非無形也成者所以為毀也變至而物戰之也鶴列陳名猶鵝觀魚麗也徒卒徒驥皂驥也麗譙高樓錙壇祭祀之地也藏逆於得謂順逆之情未忘而以得為得也死已脫謂民去湯火也通云太平本是將軍致不許將軍見太平黃帝將見大隗於具茨之山至稱天師而退七聖皆迷無所用其智也乘日之車出而作入而息也吾師乎吾師乎何問大隗通云不見文殊但見牧牛翁又云大小德山未會末後句知士無思慮之變至終身不反悲夫凌誶凌夷而詬誶之也好察者有之招世招招於世也中民入民深也宿留也際交際也比合也尤絶也盛也遭時故比於歲歲亦時也囿物故不物於易易變易也通云草裡漢莊子曰射者非前期而中至足以造於心也期而中故羿獨也無期焉則盡羿也有善念故堯貴也無公是則盡堯也秉公孫龍也冬爨鼎夏造冰抑甚異矣然未離乎陰陽也瑟應五音五音各五故二十五廢一疑不可鼓矣然宮角並應有君於瑟者存而五聲不改也且若是者耶非耶惠子曰是也儒墨楊秉則莫我非也我其是也莊子曰未也是齊人楚人之智也齊人蹢子於宋欲祕其跡雖閽者不以告之不聞始末也蹢擲也擲其子也鈃鐘小鐘也求小鐘而束縛之恐聲達於外也其事類此也唐喪也其將以喪其子使逸之異國也乃未始出域有異類矣欲蓋而彌彰也楚人之為寄者并其閽者而擲之則其事愈祕然夜半而與舟人鬥焉未始出於岑而怨者不免跡已彰也心勞而事拙也通云掩耳盜鈴漢問蹢子與舊解異何也答舊解未是莊子送葬至吾無與言之矣堊染也有色黝然污漫於鼻故斫而去之也郢人匠者之質也惠子莊子之質也惠子死莊子無與言也子期死而伯牙不鼓琴也通云罕逢穿耳客管仲有病至則隰朋可化於上故上忘化於下故下畔也不聞者聞不見者見也通云有眼如盲有口如啞吳王浮於江至三年而國人稱之敏給搏捷矢謂其狙敏給而搏尤捷於矢也通云捉敗南伯子綦隱几而坐至其後而日遠矣美不可居也是以悲也三纍而愈進焉遠也通云莫把是非來辨我仲尼之楚至大人之誠燕而揚言禮也夫子曰丘也不言之言也楚與宋戰宜僚披胸受亦弄丸於前兩軍遂解叔敖為令尹酣寢廟堂執翟秉羽而楚人忘戰是二子皆然也喙三尺喙長無用也不言言也彼謂二子此謂仲尼也相觀而善之謂摩不摩不相觀也通云口掛壁上子綦有八子至然身食肉而終所自來者不可知也禍之始也宎室西北隅也未牧而生未田而鶉生怪也則世俗之纍也渠公齊之富人封比封君也通云壓良為賤齧缺遇許由至夫唯外乎賢者知之矣仁義無誠是相與為僞也禽好貪而復假之以器也瞥瞥然以仁義之行示天下也覕瞥也或曰割也利之適以害之也通云罪過不少有暖姝者至解之也悲暖暖猶煦煦姝姝猶宛宛也濡謂沾滯需待也卷婁卷曲而傴僂也隈者形一隅也童土不毛之土也舜來而澤及下也比近也和也魚忘於江湖故得計循因也依也俄得也俄失也俄死也俄生也惟變所適也藥一也而用不同也實堇一為雄一為烏一為附也雞雍芡也豕苓豬苓時為帝故相君也勾賤之亡也所以存也鴟目見夜不見晝鶴脛雖長不可截也任之可也通云此藥亦能殺人亦能活人又云有時不恁麼故曰風之過河也有損焉至是尚大不惑風過而河為之損也日過而河為之損也不見其損也只止也已也恃源而往抑無損也水守其土影守其人物守其物固也殆危也危亂之成改不給也萃聚也功者禍之反其始緣於功而後相為禍也果實也待之久而禍始成也不知問是謂不知舉是而為問也謀無素也絶跡易無行地難也夫孰知不知之深於知也一以立多也陰以治陽也為足不如為目也均齊也齊不齊也其盡也有天其循也有照其冥也有樞其始也有彼始有彼謂無始之始而彼此森然也與為頡頏與為滑昏未嘗無實也古今不相代而不可以虧也通云休更迷頭認影則陽莫知其然者性也聖人者環中而隨成者也無內也無外也是大人也雖言而未嘗言也莫見其根也莫見其門也無名也無實也無窮也無止也言而愈疏故議有所極也通云語默涉離微如何通不犯長憶江南三月裏鷓鴣啼處百花香則陽遊於楚至除日無歲無內無外魯人彭陽字則陽不自許以之神其交謂屈己以狗交顛冥富貴也方春而假衣方冬而反風謂失時也王好佞故佞與德同稱也與人相宜有如父子非詹詹施豫之跡也聖人者達萬物之綢繆與為一者也緡茂鬱也見見聞聞猶以十仞之臺懸衆間也環中而應莫知幾時無化物之跡也洫溝洫也司御門尹皆官名或曰即保衡伊尹也名之與法是兩見也非盡慮也仲尼傅之是則見聞所不及也容成作曆積日成歲除日無歲內外交冥何見聞之有哉通云數珠一百八魏罃與田候牟約至譬猶一吷也田候牟即齊威王犀首魏臣公孫衍也通達之國若存若亡猶莽坱之野也喘管聲劍首劍環小竅吷者聲之微也通云一鏃破三關又云弓折矢盡孔子之楚舍於蟻丘之漿至其室虛矣漿賣漿者也極屋棟也存謂過存也通云不合放過長梧封人問子罕至內熱溲膏者也以衆為謂徒以多為也扶蘇吾形不知擢擾吾性也通云孟八郎漢柏矩學於老聃至於誰責而可乎辜人罪人也強之謂強勉也匿物宜其不識也大難宜其不敢也重任宜其不勝也遠塗宜其不至也或者其君實甚也愚之罪之罰之誅之民勿堪也通云是何心行仲尼問於太史至之二人何足以識因是也謂因國人之是而是之也僕御進前搏幣拱翼謂靈公之禮賢也不馮其子靈公奪而埋之銘詞所載也馮藉也謂是無公是也通云金雞一粒粟是果然否蘧伯玉行年六十至所謂然歟然乎是耶非耶然耶否耶通云逢人切莫錯舉少知問於太公調至此之謂丘里之言莫適為主也莫適為正也有拂者有宜者有差者有正者變化始終莫之紀極以是為適然也通云問取東村王老問自殉殊面答人之不同如其面然彼自殉者殊面少知曰然則謂之道足乎至其不及遠矣道者不得已而強名之也已名為道矣物不得而比也狗馬皆物也通云說似一物即不中少知曰四方之內至此義之所止隨其序之相理橋其運之相使窮則必反終則有始此物情也言之所盡知之所至如是而已若夫睹道者無終故不隨所廢無始故不原所起也通云直下無開口處少知曰季真之莫為至議有所極雞鳴犬吠盡人所知然其所自化者言不能及也所將為者意不能窺也執有執無皆未離乎虛實之見者也生可忌也未生則不可忌也死可阻也已死則不可阻也未通乎死生之說而強為之言則囿於生死者也疑之所假疑未損也夫道猶假名也所假而行者也或使莫為疑之所假於物為一曲於道為愈疏也道也者終日言而不足者也通云要頭截取去外物外物不可必也貧富適也小大適也儒以文亂法者也與其譽堯而非桀不如兩忘而化於道也智不如愚也去善而自善也人皆知有用之用而不知無用之用也至人者不留行也故遊於世而不僻也通云四十九年不說一字外物不可必至債然而道盡萇弘周大夫為靈王所殺孝巳武丁子也曾參小杖受大杖走忠而被誅孝而見責故外物莫可必也絯異也兩陷謂利害相摩也螴蜳蟲之蟄而未蘇也一進一退故不得成水勝火然月不勝火者陰陽逆也五行並有之故外物莫可必也通云師子白乳二祖鄴都莊子家貧至枯魚之肆鮒小魚也常與常所與也得不在大與不期於多通云困魚止濼任公子為大鉤至經於世亦遠矣輇才小才也纍小綸也志大者不取小通云水淺無魚徒勞下釣又云弄潮須是弄潮人儒以詩禮發冢至無傷口中珠傳語於下曰臚椎埋作姦緣飾經術以文亂法也通云稗販老僧老萊子之弟子出薪至終矜爾末僂背微曲也後耳耳垂垂也容知善容之智也豈其窘於勢耶抑才固不逮耶小惠勿偏歡虞而已是徒以為驁也終身醜之烏所稱上德哉相引者名跡相結者隱微是堯非桀以譽相高往必見夷動與邪會吾奈之何耶通云將謂有多少伎倆宋元君夜半而夢至與能言者處也阿門曲房之門也宰路淵名余且一名豫且鵜鴣水鳥能捕魚石師猶碩師也通云石烏龜生子惠子謂莊子曰子言無用至無用之為用也亦明矣廁足側足也墊謂掘地得泉也無適非用者地也掘地則不能容足以是知無用之用也通云東壁掛葫蘆莊子曰人有能遊至承意不彼流遁則覆墜決絶則火馳皆非善遊者也相賤猶相使也至人者不彼於彼者也是善遊也通云和他顛倒一上又云如珠走盤如盤走珠目徹為明至人則顧塞其竇顫香也跈謂足陷泥淖也殷中也盛也息之相穿日夜無壅人顧塞之何也通云癡人作數息觀胞有重閬至亦神者不勝閬天門也婦姑反唇則亂之始也六鑿謂形與神搆也耳目口鼻及心知也神不勝故耽隱於山丘至人者不廊廟而尊不江湖而逸也通云內外獼猴六窗來往又云貧道遊朱門如蓬戶耳德溢乎名至忘言之人而與之言哉誸急也柴謂柴柵也百官之事因衆而果事逐賢生也草木生而銚耨及之事本無而有也其生也胡然而生也靜處可以補病也眥滅可以休老也目雖無見而意以消也寧可以止遽也有事不如無事勞不如佚也本靜者本無所于動也本佚者本無所於勞也聖不如神賢不如聖也演門宋城門也善毀善執喪也毀而死毀滅性死傷生也踆蹲也踣躑躅也紀他踆水而致弔申徒踣河以殞身師許由務光而過之者也言者筌蹄也筌魚笱也蹄兔骨也通云切莫守株待兔又云明兄明兄尚缺悟在寓言為寓言也為重言也卮言日出而和以天倪也天倪者天均也近於化也心無所縣也不知死不知生故大婀也亦往亦來而無所待也睢睢也盱盱也誰與居也通云靜處娑婆訶又云火焰為三世諸佛說法三世諸佛立地聽寓言十九重言十七至天均者天倪也寓言有所托而為言也重言言之重詞之復也卮言以言飲人也藉外論之論其外不論其內也父為子媒不若非其父也言之者無罪聞之者足戒也如徒以其言先也則非所以先也陳人猶死人也言所以齊物也不言亦所以齊物也因其齊以言其不齊者因其言以齊其不齊者也有言無言也無言有言也萬物之相禪也不同形也始終變化如環無端是天均也通云舌頭不在口裏又云琉璃寶殿照明月莊子謂惠子曰孔丘行年至且不得及彼乎謝猶化也未之嘗言謂相忘不言也孔子亦有言矣孔子言之而天下之人乃服也不敢蘁立也蘁猶鱷也吾未得如孔子也通云且讓他出一頭地曾子再仕而心再化至觀雀蚊虻相過乎前也不洎謂不及親也椎牛而祭墓不如雞犬之及其生存也無所縣言無所係也其無所縣乎其罪乎夫子曰未也哀樂入之其何能無係也通云猶有這個在顏成子游謂東郭子綦至若之何其有鬼耶野曠曠若失也從服從也通達也物謂物至而應也來謂來無不宜也鬼入鬼含德也天成與天遊也不知死不知生死生一也大妙衆妙之門也生有為者也死者公也人所同也宜勸也自生而之死也有自也而其生也陽也無自也其說之果然者乎其不然者乎惡乎適也惡乎不適也今夫天其曆數可考也今夫地其方隅可據也死生之故吾惡乎求之哉以為無命則莫知其所終也以為有命則莫知其所始也其有以相應耶則何以無鬼耶其無以相應耶則何以有鬼耶吾不知也吾不知也通云生從何來死從何去衆罔兩問于景至何以有間乎括謂括髮也稍問問之末也屯聚也彼謂形吾謂景景之與形恆相待也而形亦未為無待也吾徒以為強陽耳強陽者幻也幻何所辱問乎通云焦磚打著連底凍陽子居南之沛至舍者與之爭席矣仰目而雎張目而盱傲然自得故人莫與居也其往也數數然也其反也則已謝之也通云百丈再參馬祖讓王延陵州來竊慕子臧之義漆園有焉豐約惟其所遭險夷齊於一致也通云棄金輪從鹿野六年橡栗馬麥為緣堯以天下讓許由至終身不反也捲捲猶惓惓也葆力自葆其力也通云目視霄漢太王亶父居邠至豈不惑哉邠居允荒詩所以歌天作也通云慈悲大煞越人三世弒其君至越人之所欲得為君也專諸慶忌未之聞耶通云何處不稱尊韓魏相與爭侵地至可謂知輕重矣奈何哉以天下為桎梏也通云自生分別魯君聞顏闔至豈特隨侯之重哉不以彼易此通云裴休黃蘗子列子窮容貌有饑色至民果作難而殺子陽列子加於人一等矣通云蠱毒之鄉切忌嘗他一滴楚昭失國至遂不受也臣不敢貪天功以為己力也三旌上卿也通云雲居舜老夫原憲居魯至憲不忍為也褐以為塞衣塞牖也通云舍貧從富心不均平曾子居衛至致道者忘心矣道豈與貧適耶通云無心猶隔一重山孔子謂顏回至是丘之得也使爾多財吾為爾宰通云兩個不唧溜漢中山公子牟至可謂有其意矣有其意而未逮也通云放不下擔取去孔子窮於陳蔡之問至共伯得乎丘首共伯即共和也厲王之亂諸侯立共伯在位十四年致政宣王歸隱丘首通云一曲兩曲無人聽舜以天下讓其友人至因自投清冷之淵至人無死地通云大似船子湯將伐桀至負石而自沈於廬水死猶不死也通云汨羅未必獨惺惺昔周之興至此二士之節也賴利也彼豈利富貴哉高節至行獨行其志者也爝然與日月爭光也通云西山亮座主盜跖外篇雜篇多膺作此較著者大約似晉人語通云不妨疑著孔子與柳下季為友至幾不免虎口哉不可無一不可有二通云踞虎頭收虎尾須是其人問鮑焦與子貢同時棄疏而死是否答有之子張問於滿苟得至離其患也五紀五德之紀也六位謂乾坤六位也而汝也仲尼之毋曰徵在少失母故不見毋通云正好一坑埋卻無足問於知和至不亦惑乎推正不忘謂推服正論有所未忘也專無主正云無主而不得其正也與俗化世所謂隨俗苟且也賅猶咳賅溺為病氣馮陵也體澤汗發背也滿若堵耳謂積財滿環堵也醮焦也臺榭之變為樓疏遠也通云扯間葛藤說劍封三錢之府為陶之富人耶策士餘風或為鼓琴或為擊劍通云殺人刀活人劍昔趙文王喜劍至斃其處也雜纓短服武靈所為胡服騎射者也敦尚也鋒劍首也鍔刃也𨭐所以淬也鋏所以把也通云珊瑚枝枝撐著月漁父孔叢子劉向之餘也通云何不一篙打落孔子遊乎緇帷之林至吾敢不敬乎拏竹器所以刺舟兩容謂善否兩容也顏適以顏色適人也祿祿猶碌碌也比之服役謂內之門墻也通云篙人用意良列御寇巧者勞而智者憂也無能者無所求也有德者不知也至人者歸精神於無始而甘瞑乎無何有之鄉也且世亦多故矣有外刑也有內刑也人心險於山川也賊莫大乎有心而有睫也千金之珠非寶也犧牛不如孤犢也以不平平之以不徵徵之其可也通云花發不萌枝鳥棲無影樹列御寇之齊至虛而遨遊者也五者先饋人敬己也形諜於外成其光儀人來敬己也履滿戶外名節逾彰也扶杖支頤立而不進也使人保汝不能使人無保汝跡逾彰也其感之者先也其出而人異之也搖爾性蕩爾真也將焉用哉相孰言莫可誰何也通云雖善發藥要且不知藥忌鄭人緩也至古之人天而不人秪猶但也使而子為墨良為秋柏之實子告父之言也良埌也冢也謂墓木拱也莊子曰報施胡巧也緩故使弟為墨也彼故使彼也使弟為墨而與父辨是賤其親也是何異於以井飲人而捽其飲者也過不在他也宜不得其死也今之世皆緩也通云爭怪得又云閉眼入蝸牛朱泙漫學屠龍至而不知大寧聖人以必然者為不必然也衆人以不必然者為必然也爭與不爭之分也好爭故有求好爭者亡也通云當時只消道個不必宋人有曹商者至子行矣黃馘色不澤於耳也通云鴉臭當風立魯哀公問於顏闔至惟真人能之既飾毛羽又為畫衣多文飾也支離其旨亂聽聞也夫何足以加民也彼謂仲尼汝謂哀公也彼果宜於汝歟而豫之以祿養歟君誤矣君誤矣誤而可矣不然則否也休之可也且彼難與為治也施於人者未忘商賈且羞之神明之人勿以相齒也外刑者金與木也內刑者動而得過也離麗也五金三木所以為刑也通云未夢見在孔子曰凡人心險於山川至不肖人得矣有貌謹願而情求利益者有中實有所長而外若不肖者有和順輕悁而達於理者有堅強而實柔縵者有怠緩而實釬急者就義若渴去義若熱人情難測如此也通云有時先用後照有時先照後用有時照用同時有時照用不同時正考父一命而傴至達小命者遭傴曲背僂曲體也初命為士再命為大夫三命為上卿也而夫猶夫夫也呂巨驕矜貌唐唐堯許許由也心分眉睫心智多也泚猶訾也緣循猶因循偃佒猶偃蹇也美者適以為窮惡者適以為達命不齊也有知慧而外通者有勇敢而多怨者有仁義而多責者命不齊也達生故任運達知故肖生也達大命者順之而已達小命者唯其所遭也通云不是心不是佛不是物人有見宋王者至不亦悲乎奚微之有言微軀不足存也平治也徵效也平也不平則不平平也徵也不徵則不徵徵也明者不如其神者也明者惟有為之是使而神者徵之也夫孰能以不徵徵也故逾貴也愚者乃徒恃其所見以求人於人也則其外焉者也通云空手把鋤頭天下人尚其私說以道術相高也吾師乎吾師乎別黑白而定一尊乎通云赤幡之下起清風天下之治方術者多矣至道術將為天下裂有天人有神人有至人有聖人有君子君子最下也養民之理未可廢也古之人明於本係於末鄒魯之士縉紳先生能言之也儒術是也百家衆技徒一察焉以自好也通云外道九十六不侈於後世至才士也夫非樂節用墨子所以名篇也以鬥為非故不怒也雖不為異亦不苟同也方其未敗而天下師尊之雖然恐不類也勤苦其生菲薄其死其道觳而未安也反天下之心故離於天下也跂木履也蹻麻履也墨分為三相里勤其一也苦獲已齒一也鄧陵子又其一也其意則是其行則非也其才未可少也通云無人處斫額望汝不纍於俗至其行適至是而止宋鈃尹文並齊人與鄒衍鄒奭為辨別宥猶在宥也將以柔胹合歡於群類也先生且不得飽況弟子耶通云三十年後此話大行公而不當至概乎皆嘗有聞者也易平易也不兩謂不二於物也慎到一名廣泠汰於物與物寡營也謑髁不正不定之貌無任無所事任也縱脫謂不羈也或推或拍或輐或斷一切委蛇與之宛轉也魏然猶兀然也隧轉運也得全故無非無已故不建已塊塊然無知也適得怪焉謂多怪少可也不教謂不待教令也窢然風聲也輐斷無圭角也通云一切處放教枯淡去以本為精至古之博大真人哉開尹名喜字公慶在己者無常居形於物而自著人用其巧我用其拙故泊然無為而笑人巧也通云須是這漢始得芴漠無形至未之盡者為死歟為生歟與天地並歟與神明往歟儻謂惝恍難憑也雖時縱恣而不入於無憑也觭譎異也譴訶譴也連犿謂宛轉相從也其理深長故不竭其來委隨故不蛻也蛻者形之遺也芒乎昧乎未之有也通云分半座與他惠施多方至形與影競走也悲夫不可積故無厚也天猶地也澤猶山也日之中猶晐也物之死猶生也小同異非大同異也畢異畢同大同異也異中同同中異也南方無窮而有窮也今日適越昔已至也連環不可解而可解也中央者南北是也謂卯有毛也謂雞三足也謂郢為天下也謂犬為羊也謂馬有卯也謂丁子有尾也楚人呼蛙為丁子謂火不熱也謂山有口也謂輪未嘗蹍地也謂目無見也謂指不至也謂至不絶也指以至為功至以絶為極也謂龜長於蛇也謂矩不方也謂規不圓也謂鑿不準枘也謂飛鳥之影無動也謂矢鏃之不止不行也謂狗非犬也謂黃馬驪牛為三也謂白狗黑也謂孤駒無毋也持尺寸之棰日用其半可萬世不竭也是摻何術也桓團公孫龍之徒不能勝也以是為根柢也其言曰天地其壯乎雄猶壯也施雖欲與天地並雄而終無異術也倚人猶畸人也不辭而應不慮而對辨而無辨不辨而辨也故遍萬物而為言也終益之以怪也反人謂與人乖反也勝人勝於人也故與衆不適也隩奧也僻也蚊虻其小者也夫充乎一物以為言則尚可也苟曰愈貴則與道幾矣道不可言也惠子不能以此自休而散漫於萬物不自足也卒以善辨為名也惜哉駘蕩而不反也通云算來不直半文錢又云正法眼藏瞎驢滅卻問何云愈貴道幾矣答須知尊貴一路自別
