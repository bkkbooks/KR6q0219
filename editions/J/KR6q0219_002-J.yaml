body:
  text: 雲溪俍亭道人淨挺著檇李珥信居士錢江閱駢拇絕聖棄知因任自然無懷葛天由來者遠通云金屑雖貴落眼成瞖駢拇枝指出乎性哉至非天下之至正也侈於德則害德侈於性則毀性侈者非其分也少者不欲其不足多者不欲其有餘也多方仁義何為也離朱者駢於明也師曠者侈於聰也曾史者枝於仁也楊墨者駢於辯也駢枝非正也通云佛之一字吾不喜聞問何為敝跬譽荅敝敝焉跬其足以譽無用之言也跬即跬步也彼正正者不失其性命之情至天下何其囂囂也仁義設而天下始多故矣仁立而憂其不仁義立而憂其不義決駢齕枝所以亂也盍返自然哉通云彼自無瘡勿傷之也且夫待鉤繩規矩而正者至是非以仁義易其性與禮樂仁義何紛紛也自有虞氏昉也則惑也通云文殊普賢貶向二鐵圍山不為分外嘗試論之自三代以下者至又惡取君子小人於其間哉貪夫殉財烈士殉名夸者死權眾庶馮生廉如伯夷役人之役適人之適也何論盜跖通云頭頭非取捨問投瓊曰博不投瓊曰塞塞與賽是同否荅博塞即圍荅塞戲也且夫屬其性乎仁義者至不敢為淫僻之事也自聞則無所不聞自見則無所不見奚敝敝焉飾仁義之途驚天下之耳目哉自適而已自得而已此性命之情道德之正也俞兒事黃帝善別淄澠通云除斷妄想趨向真如正好門前之遶馬蹄伯樂善治馬而馬始多故矣陶匠善治埴木而埴木始災矣聖人善治天下而天下始疑天下始分矣故曰無治之以其治而治之以其不治通云我今日牙痛馬蹄可以踐霜雪至此亦治天下者之過也馬死者性失也埴木有性豈任方圓豈任曲直哉而猶且稱之曰治也治也則已過矣治天下亦然母為伯樂母為陶匠其可也通云清淨行者不入涅槃破戒比丘不入地獄吾意善臨天下者不然至可攀援而闚獉獉爾狉狉爾吾與鳥獸草木同入於玄化之中而莫知其孰為此孰為彼也通云情與無情皆為一體夫至德之世同與禽獸居至五聲不亂孰應六律馬有性埴木有性人亦有性無知是也無欲是也是以貴乎同也仁義禮樂何紛紛也仁義設而道德始廢矣禮樂設而性情始離矣聖人者何苦作為文采以亂人目作為聲音以亂人耳哉通云取禪板來取火來問蹩躠跂是蹇蹇意否荅云是問澶漫是緩散否摘僻是勞役否荅云是夫殘朴以為器至此亦聖人之過也工匠罪歟伯樂罪歟聖人過歟絕其聖去其智墮耳目黜聰明古之人尚哉通云長老何年行道威音王以前猶是王老師兒孫坐第二位去問衡扼月題是馬飾否荅秦風小戎皆是也問介倪是介然睥睨否荅云是問何為闉扼荅闉猶城闉也馬不馴故闉其扼慮其逃靷也問何為騺曼荅一為猛鷙一為衍曼馬炫其智能以與人爭得也故曰盜也胠篋皇降而帝帝降而王王降而伯伯降而盜譚仁義者適為盜資耳著胠篋通云彼魔法中假我衣冠稱善知識將為胠篋探囊至不乃為大盜積者也仁義禮樂治天下之緘縢扃譎也而竊者以之故聖人生而大盜起也通云瞿曇也須喫棒故嘗試論之至以守其盜賊之身乎立宗廟社稷治邑屋州閭鄉曲者皆聖知之法也盜其國弒其君并其法而有之田成子是也天下之為田成子者豈少哉宜若聖人之過也通云纔有一毫頭便有一毫頭嘗試論之至四子之賢而身不免於戮殺諫臣誅善類者暴君也其所用者聖人之法也為法之敝一至於此故聖人不能無過也萇弘之血化碧臛目曰胣通云邪人用正法故跖之徒問於跖曰至是乃聖人之過也智仁聖義勇者所以治天下之具也而盜跖有之是聖人適為盜資也聖人不死大盜不止翹翹然以仁義招天下者是適與盜人謀也斗斛權衡符璽皆是也竊國者且侯矣刑賞者徒具文也通云一為波旬一為帝釋問魯酒薄而邯鄲圍許慎註謂楚吏求酒於趙勿得故圍是否荅楚伐魯謂其酒薄也魏因伐趙圍邯鄲以楚不能援趙耳川竭谷虛丘夷淵實事相類也故曰魚不可脫於淵至法之所無用也仁如魯史辯如楊墨聰如師曠巧如工倕明如離朱適足以亂天下耳火飛曰爚絕聖棄知以為玄同聖人者天下之利器也利器不可以示人通云如愚若魯子獨不知至德之世乎至當此之時則至治已民忘其治謂之至治其言本於黃帝容成大庭以類舉也通云毘婆尸佛尸棄佛毘舍浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛今遂至使民延頸舉踵至好知之亂天下也鳥亂於上魚亂於水獸亂於澤皆亂也天下大亂俗惑於辯去知與故則莫若求其所已知而非其所已善通云知之一字眾禍之門自三代以下者是已至啍啍已亂天下矣役役者動也啍啍者言也作誓作誥何啍啍也其感人以末也通云杜口毘耶掩室摩竭在宥物於物者不足以治物也不物於物故忘物忘物而物無不得矣在宥是也通云死貓頭聞在宥天下至有治天下者哉在之則無適而不得矣宥之則無往而不釋矣奚其治奚其治通云總不消得昔堯之治天下也至安其性命之情哉毘於喜則不恬矣毘於怒則不愉矣盜跖曾史者賞罰之招也其原自堯桀始喬詰卓騺何暇安性命之情哉喬者矯邁詰者屈曲通云黑暗女功德天而且說明耶至吾若是何哉說者情之所之相助也安性命之情者存可也亡可也苟為不安是亂天下也尊之惜之何為也過而去之忽然若遺其可也為齋戒為跪坐為鼓歌若是者何也通云物事門中不捨一法實際理地不受一塵故君子不得已而臨蒞天下至何暇治天下哉無為自正上理也無解五藏無擢聰明貴其身愛其身也黃帝老子之所以治天下也尸居淵默為龍為雷神與化俱故天與理適也無為也無不為也炊者希聲累者希形也通云枯木龍吟髑髏眼睛崔瞿問於老聃至罪在攖人心人心者僨驕而不可係者也臧人心攖人心攖人心乃亂排下進上上下囚殺亂之始也能為淖約以柔剛強能為廉劌能為雕琢熱如焦火寒如凝冰俛仰四海其居微芒其動飄忽如是其不可係也攖之不可也黃帝堯舜且失之況三代以下耶脊脊大亂宜其駭也通云我自覓心了不可得問何為廉劌荅謂方隅斷割也故賢者伏處大山嵁巖之下至而天下大治椄槢囊頭木也嚆矢矢之猛者仁義聖智攖人心者也猶桎梏也通云念佛一聲嗽口三日黃帝立為天子至又烏足以語至道所欲問者物之質也所欲官者物之殘也所問非所官所官非所問也不族而雨不黃而落日月蝕矣猶佞人以求治也奚足語哉通云沒你話會分黃帝退捐天下至廣成子之謂天矣貴以身愛以身故治身千二百歲而形不衰善治身也廣成子之謂天也天者神明之宰也通云轉輪聖王身相無量壽命無量問至陽之原故有明至陰之原故有闇是否荅明中暗暗中明問守一荅青州布衫廣成子曰來余語女至人其盡死而我獨存乎無窮無測莫可終極不死也不生也離得也離失也為皇者古也為王者今也見光者天也為土者地也皆是也生於土反於土命也生之無生也死之無死也余將去汝入無窮遊無極與日月參與天地並莫知其終也緡猶冥也冥冥昏昏進之無可當也退之無可遠也人盡死而我獨存是治身者也通云死中得活雲將東遊過扶搖之技至雲將不得問遊耶吁耶吾弗知耶吾弗知耶是有謂耶是無謂耶何不得而問耶通云雲門胡餅又三年東遊至起辭而行天者稱鴻蒙也謂鴻蒙為所天也浮遊猖狂無適而不得也內觀無妄勿謂形勞也余何知哉余何知哉雲將曰向也自以為猖狂而民仍隨予所往也予不得已也今則否也今則民放余余自放也願受令願承教也鴻蒙曰未也亂天逆物治人者之過也雲將曰奈何鴻蒙曰毒哉甚矣憊也曷歸乎曷歸乎僊僊乎歸也雲將曰願聞一言鴻蒙曰養心上也無為自化解心釋神窈窈冥冥莫知其真物將自生雲將曰得之矣乃今而知所為身與所為德也通云不許夜行投明須到世俗之人至睹物者天地之友喜乎同己惡乎異己以出眾為心也欲出眾者則安能出眾哉其不如眾技者則己眾矣夫有物者不可以物物也不物於物故能物物獨往獨來是謂獨有有問有應無嚮無方挈汝而往與為撓撓無端也無旁也無始也為之頌論冥乎大同墮形體黜聰明大同而無己也有而無有故不得有其有也無無亦無故無有無有也睹有者君子之陳跡也睹無者猶未離乎天地也非然也通云有無是兩頭語賤而不可不任者物也至不可不察也無為也無不為也任天而遊者一物不能外也民與事俱也無為則尊有為則益為累此天人之分也通云不任有為不盡無為問何為中而不可不高荅雖無過與不及而坊表自峻問何為薄於義荅薄猶近也問何為應禮不諱荅自然合節非諱忌也天地無無故無名無名者一之所起也得一以清得一以寧得一以為天下貞玄之又玄眾妙之門通云滿口道不得天地雖大其化均也至天德而已矣君猶天也道曰天道德曰天德通云同根一體以道觀言而天下之君正至無心得而鬼神服正其言定其分列其能而后可以汎應也道也所以觀物也道兼於天以天治故通於一也道無心合人人無心合道也通云前三三後三三夫子曰夫道覆載萬物者也至死生同狀虛而應物故物無不得也心大於事故藏事我周於物物往歸之於己非有所私也雖王天下不以為顯也隱顯一故萬物一萬物一故死生一也通云木人見花烏夫子曰夫道淵乎其居也至大小長短修遠道貫金石故萬物莫能定也王德言以德自王也素履之往獨行也通於事者其恥也故遺事也通於事者其知也故存神也心出而物採之矣而心容有係物者乎曉焉者其獨見也和焉者其獨聞也至無而求不匱也時騁而艮於庭也小之無勿大也短之無勿長也修然遠也通云庄上喫油餈咄咄怪事黃帝遊乎赤水之北至象罔乃可以得之乎知索之任智也離朱索之任目也喫詬索之任言也是不如其忘象也象罔者忘象者也異哉象罔之果可以得也通云罔明出得女子定堯之師曰許由至南面之賊也以人受天故乘人而無天徒止惡也而不知惡之所由生也何於適於忘也身本一也形乃異向尊其所知如火之馳紜紜者緒也為緒使也役役者物也為物絯也其何能配天也尊祖故收族父之父為祖能為眾父而不能為眾父之父治率由之亂率由之治亂并也臣之禍也君之賊也通云同時不識祖又云祖父從來不出門堯觀乎華至封人曰退己堯請問而封人曰退者忘言可也通云好事不如無問三患荅老病死又云三災堯治天下至俋俋乎耕而不顧俋俋猶邑邑也徑行而直情也耕而不顧何也通云懶殘懶殘不為俗人拭涕秦初有無無至同乎大順一者何也無無矣無名矣吾不知其何所起也未幾而未形者以生矣未幾而有分者無間矣未幾而成理矣未幾而保神矣德也命也形也性也返同於初初乃一也虛之至也大之至也異啄同鳴上下并也冥冥昏昏是玄德也通云對朕者何不識問合啄鳴啄鳴合荅云吽吽又云婆婆和和問泰初有無郭以無有無名為句得否荅云亦得謂太初在有無之間并有無之名面亦無之也夫子問於老聃至是之謂入於天放者傚也離析堅白若懸日月而托諸寓也長於辯者也此可為聖人乎是執狸之狗也是猿狙也成思故怵心山林來故勞形也有首趾無心耳狗類也猿狙類也若是者眾矣形存而無形者并存焉人之至也抑胡寡也動也其止也死也其生也廢也其起也皆非其所以也有治在人者有治在天者忘乎忘乎入於天者也通云韓盧逐塊又云猿猴彰古鏡蔣閭葂見季徹至欲同乎德而心居矣荐陳也陳前說也局局展然笑也且其自處也危矣美好設而民將從之猶多其觀臺榭以娛耳目也觀臺既多物必超往其為投跡者眾矣溟涬猶鴻芒也豈以堯舜為先而我後哉兄者先也弟者後也居安也亦曰止也通云不掛本來衣莫行心上路子貢南遊於楚至何足以識之哉博學以擬聖於于以蓋眾弦歌以成名聲是桔槔之智也於于猶于于也托生並行殆浮游其生以與眾庶並也汒乎淳哉忘智巧也譽之不顧也非之不受也失不加損得不加益也是渾沌之人也望其言若河漢也何足以知之也通云從來疑著這漢諄芒將東之大壑至此之謂混冥橫目猶比目也照曠所照者曠也進而德人進而神人累況而上也通云井覷驢驢覷井問何為行言自為荅吾行吾言自為而已非有他也問無鬼與赤張滿稽至聖人羞之其未瘍也何所需吾藥也其不禿也何所需吾鬄也操藥而進其色燋然不如其不藥也聖人羞之也通云也不消得至德之世至汲汲然唯恐其似己也標枝漫然在上野鹿任所之也諛其親諂其君是導諛也世俗之所然而然所善而善亦猶之導諛也何必君親之非而流俗之是也導人者從人者也諛人者悅人者也合群言以為譬飾小文以為辭徒將以聚眾也而本末終始不相及也則惑也彼導諛者何也垂衣裳設采色動容貌以媚世也愚之至也雖有祈嚮不可得也折楊皇荂俗樂也高言不入於耳俗言勝也擊缶鼓鐘樂殊雅俗俗而奏之清濁混也惑之甚也推擇也擇而不推則無擇也無擇誰比憂也比近也大風為厲厲之人唯恐其子之類己也人盡明也惑者何也通云惺惺著百年之木至亦可以為得也斲木為樽斷者棄之美惡不同失性一也跖與曾史猶是也困惾者逆也厲爽謂失味也鳩鴞在籠虎豹在囊檻困之至也內支離於柴柵外重纏繳離跂於楊墨者困之至也乃自以為得乎通云披枷帶鎖天道無為自正無欲自化天之道也帝王者莫不由之施之有後先用之有本末也主職要也臣職詳也得其意忘其象可也通云立乾坤句天道運而無所積故萬物成至與天和者謂之天樂天也帝也聖人也一也皆道也道運而無所積者也無為也無不為也虛之極靜之篤也君可也臣可也上可也下可也隱可也見可也和於人者也和於天者也通云不面帝堯顏又云有向有奉問平中准荅其平也中准中准猶中規中矩也莊子曰吾師乎至古之人貴無為也生也天行死也物化故鬼不祟魂不疲宗天地主道德用天下而有餘也無為者也通云無生死故不求出上無為也至此不易之道也主職要也臣職詳也無為者上也有為者下也通云與和尚提鞋攜杖不為分外故古之王天下者至用人群之道也古之人不下堂皇而天下治也通云帝德尊寰宇問落天地荅天地其後焉者也故落天地本在於上末在於下至非上之所以畜下也有本末有後先故物尚其功而道有其序也序者次也審其次而後上可事也下可畜也物可治也身可修也治之至也形名非本也賞罰非始也無倒行無逆施也通云門庭施設曲為今時威音以前無是事問五兵荅弓殳矛戈戟問比詳荅比度詳審問萌區荅草木甲析也問因任荅因其能而任之問原省荅原其過而省之問襲情荅襲安也問五變荅自明天至形名而五問九變荅至賞罰而九也昔者舜問於堯至天地而已矣天之德而出也寧矣日月之照而四時行矣何為也哉天之合也膠膠擾擾人之合也通云正中偏偏中正孔子西藏書於周室至夫子亂人之性也六經六緯為十二經說未終而老聃遽止之故曰中其說也後言失言也道德失而為仁義無私焉乃私也偈偈猶敝敝焉擊鼓而求亡子也噫過矣通云是窮子喻士成綺見老子而問至其名為竊止百舍行重趼嚮之勤也棄妹則寡愛生熟不盡前謂食無餘味也漠然不應者機也心正卻故願有請也卻謂卻而不前也脫焉遠也呼牛應牛呼馬應馬於名無所爭也服常服無改吾初度也非以其服而服之也雁行履行再拜稽首而進也崖然自異也衝然自雄也額然未忘闞然未嘿義然未消也係馬而止心如馳也動而持不及持也機發發也察而審徒與為智巧也泰者已甚曙已然不睹未然也凡此者不相信也邊竟有人其名為竊未啟其籓而妄意其室也通云九上洞山三登投子夫子曰夫道於大不終至至人之心有所定矣惟道備物大小無間泰定故神閒也通云十字街頭識取天子又云長安雖亂我國晏然問何為不終荅無終窮也世之所貴道者書也至古人之糟魄已夫道者不可以言傳也其可傳者糟魄也書不盡言言不盡意也通云得意忘言道易親問何為徐則甘而不固疾則苦而不入荅遲久則漸甘然恐其不深固急疾則殊苦正慮其罕契入天運無所為而為者天也大音希聲也仁義禮樂儒墨之陳跡也非天也通云寶鏡當風重重錦縫天其運乎至此謂上皇天乎地乎日月乎雲乎雨乎風乎誰為為之者乎洛有九故曰九洛皇建有極日月順序風雨時也五常猶五德也六極於九疇處一焉通云九州皇化裡商太宰蕩間仁於莊子至是以道不渝至人無親非無親也親固不足以言之孝固不足以言之也如徒曰孝耳孝耳此非過量之言不及量之言也至仁者兼忘者也至貴者忘爵至富者忘財至願者忘名譽并棄也忘也通云子若吼時祖父俱盡又云子歸就父父全不顧父子之恩刀斧砍不開北門成問於黃帝至乃不自得異哉所聞通云一種沒絃琴惟師彈得妙帝曰汝殆其然哉至汝故懼也盛衰異理清濁異宜如雷也如霆也無尾也無首也胡然死也胡然生也胡然僨也胡然起也無窮也不可待也故懼也通云乾闥婆王奏樂吾又奏之以陰陽之和至汝委蛇故怠塗卻謂以大卻為塗守神以神明為守也揮越也綽寬也不能見故知窮不能逐故力屈既所不及乃至委蛇故怠也通云乍如賡白雪吾又奏之以無怠之聲至而故惑也混混相逐如叢之生林林其樂而遺其形布而揮之不可曳也窮幽及昏聽無聲也疑之故稽於聖人稽察也天樂謂鈞天廣樂也無言故希聲說和豫也聽之無接故惑也通云迦葉作舞大地山河作舞樂也者始於懼至道可載而與之俱也其愚也道也道可載而俱也咸池備也通云大好一場曲調孔子西遊於衛至而夫子其窮哉芻狗以芻為狗所以祭也蘇者樵蘇之屬夢耶眯耶言世且易之也不敬故易之也桔槔者人俯亦俯人仰亦仰人引非引人也從之便也古今者應時而變者也三皇不相沿禮五帝不相循法也矉者何也通云俱胝伸一指童子亦伸一指孔子行年五十有一至天門弗開矣不由中出者也故不出也不由外入者也故不隱也仁義者可一宿而不可久處也覯遇也使人覯之則責之者至矣故貴乎淡忘也采真服真也鑒戒也湮沒也天門閶闔之門應靈府也通云不借借孔子見老聃而語仁義至蹴蹴然立不安言黑白之質者不足以為辯也飾名譽之觀者不足以為廣也以孔子聲見者藉孔子為援也倨堂而應微是老子深遠也殺其殺者親有等也未至於孩而云誰喪其朴也殺盜非殺謂所殺者盜也殺以止殺非殺也人自為種言人自為類而天下從此分也其作始有倫各自為匹而今也女而婦也淫其色也新臺是也敝笱是也何言哉何言哉鮮規之獸獸解網莫能規也規制也通云無理可伸無言可對問人自為種而天下耳此理何如荅起為世界靜為虛空虛空為同世界為異孔子謂老聃至丘得之矣鉤用引而用之也鶂相感以目虫相感以聲類獸名生亶爰之山自為牝牡物化之不齊也烏鵲之生也以孺魚之傳也以沫虫之細腰者以化人之有弟也而兄啼皆物化也不與化為人夫胡及於化也化人者及化者也得之也得之也通云龍神乞戒問烏鵲孺是卵生魚傅沫是濕生細腰化生有弟胎生果否荅亦是刻意無不忘也無不有也恬淡虛無乃合天德純之至也素之至也通云月在青天水在瓶刻意尚行至聖人之德也高也非其高也修也非其修也治也非其治也閒也非其閒也壽也非其壽也彼何人也彼何人也通云頭長三寸頸長二尺問熊經荅道引服氣若熊引樹而經也故曰夫恬淡寂漠至乃合天德死生夢覺也若浮若休則死生一不夢不憂則夢覺一通云隻履空歸宋雲遇之蔥嶺故曰悲樂者德之邪至天德之象也天一生水水者天德之象也水不雜則清莫動則平然鬱閉亦不能清故歎逝於流泉而不徒鑑於止水也通云死水不藏龍又云萬里無雲天有過故曰純粹而不雜至能體純素謂之真人干隧吳地或曰干溪吳越產劍故云干越之劍一之精通謂惟其一是以精上通也倫類也通云金剛王寶劍繕性繕治也古之治道者以知養怡以怡養知交相養而和理出焉所謂性也道可治性不可治也治之則失其性也去性而從於心則無以復其初也通云打車即是打牛即是繕性於俗學以求復其初至物必失其性也役於學者俗學役於思者俗思恬養知則無知而知知養恬則知而無知道與德也性也仁義禮樂皆是也忠亦猶是也行不偏也彼我各王而蒙己德非德之也夫德則必有不冒者矣大德不德苟為冒之是物失其性也通云其施汝者不名福田供養汝者墮三惡道古之人在混芒之中至反其性情而復其初順之則惟恐其逆也故不一也降而下也安之則惟恐其不安也故不順也降而愈下也離其道以為善險其德以為行乃始去性而從心也心與心搆而知識叢生則大亂之道也減其質也溺其心也無以復厥初也通云教壞人家男女由是觀之至又何為哉道隱則世衰世衰則道愈隱道無以興乎世世無以興乎道也雖不在山林猶隱也道不行也古之人其可以有為而行也則治反於一而化行無跡也其不可以有為而窮也則深根寧極以待時也通云三問茅屋一道神光是何等人受用道固不小行至謂之倒置之民樂全故志得也無以益其樂也其儻來者寄也軒冕樂也窮約樂也樂彼猶樂此也通云何處不稱尊秋水束於教者不可以語道也天地非大也毫末非小也以道觀之則何貴何賤何少何多也知道者達於理達理者明於權火弗能熱水弗能溺寒暑弗能害禽獸弗能賊也本乎天位乎得反要而語極也反其真也有形者不如其無形也風不如目目不如心也臨大難而不懼者勇也道之至妙者不可以智知也管未可以窺天錐未可以指地也曳尾於塗中樂也毋以梁國嚇我也子猶我也我猶魚也子知我我知魚也是物之適也通云燈籠緣壁上天台又云藕絲牽大象秋水時至至向之自多於水乎涇流大於兩涯故不辨牛馬河漲溢也尾間即沃焦山海水泄處也礨空小穴也稊米稗也人卒謂人與卒也卒廝養也戰國之民多為兵故屢稱人卒海不敢自多也奈何哉其以河自多也通云雞棲鳳巢非其同類河伯曰然則吾大天地至足以窮至大之域小非寡也大非多也量無窮也遙者故也望之難即而不以為悶也掇者今也俯而取之而非可跂及也時無止也得之不足喜失之不足憂也生無可樂死無可畏也知也不如其無知也生也不如其無生也通云父母未生前如何是你本來面目河伯曰世之議者至約分之至也垺廓也殷盛也細不能視大大不能視細也不相及也勢也雖然其有形者也有形者言論及之意致及之者也其不及者道也大人者吾無以名之也雖不出於害人而亦不多仁恩雖動不為利而亦不賤門隸是兩行也不爭也不讓也事不借人不多食力何其廉也然不以貪污為賤也是兩行也雖殊俗而不為矯異也雖從眾而不習卑諂也是兩行也道人者無聞者也至德者不德者也大人者無己者也約其常分以為至也吾無以名之也通云至人無己靡所不已河伯曰若物之外至小大之家貴非貴也賤非賤也大非大也小非小也惡乎倪惡乎倪有差數有功分有趣操萬物盡等也貴賤有時未可以為常也梁麗屋梁也或曰車也能為大不能細也馬猶是也鴟鵂猶是也有能有不能也萬物之情也歸休乎河伯毋漫言貴賤毋漫言大小也通云不作貴不作賤河伯曰然則我何為乎至夫固將自化無為也無不為也反衍反覆相衍也大蹇連連蹇蹇與道俱也施而謝之無所受也參差不一而行也承接也翼相助也任萬物之無方而我不宰也短長一齊也生死不足恃也虛滿無其形也年歲若遺時一往也終則有始天行也動與變準也時與化移也無為也無不為也夫固將自化也通云頭頭非取捨河伯曰然則何貴於道耶至是謂反其真察安危寧禍福謹去就者權也本天以治人也位於得故無不得也蹢躅屈伸無往而不得也反物之要而語道之極也任天而不任人也去智與故反其命也得其所得而不以美名市也通云有權有實有照有用夔憐蚿蚿憐蛇至惟聖人能之夔一足蚿多足蛇無足其行一也然不如風也風又不如目目又不如心也有形者不如其無形也通云鐵牛無腳也須行問指我則勝我趥我亦勝我何也荅指我謂望風而止趥我謂躡風而行也小不勝也折大木蜚大屋則大勝也孔子遊於匡至請辭而退足於天者人損不能入也通云睦州一隻草鞋公孫龍問於魏牟至乃逸而走幹井梁也甃井壁也虷赤甲虷蟹皆旋於井彼與科斗莫余若也商蚷馬蚿也是蛙類也壽陵邑名餘子小子也未十六為餘子國能邯鄲所能也學步者何也通云邯鄲學唐步又云蝦跳不出斗莊子釣於濮水至吾將曳尾於塗中與為朽甲也不如為龜息也通云參活句不參死句惠子相梁至子之梁國而嚇我耶練實竹實也庖人不治庖尸祝不越俎而代余無所用天下為也通云三詔不起莊子與惠子遊於濠梁之上至我知之濠上也全矣猶云果然也請循其本謂循其本論也既已知我知之而問我是子知我也子知我我知魚也濠上之魚猶濠上之我也我知之濠上也魚亦我也我亦魚也通云鄂渚巖頭華亭船子至樂至樂無樂至譽無譽無為也無不為也生本無生也死生晝夜也死之樂雖南面王不能過也名止於實義設於適也未嘗死未嘗生也從物化也出於機入於機通云何不了取無生本無速乎天下有至樂至孰能得無為哉富貴壽勞其形以為樂也非至樂也至樂無為也芒芴希夷也職職猶役役也通云寒山逢拾得問奚為奚據荅為行也據止也問久憂不死荅長處憂患盡形壽而不死也何其苦也問足以活人荅適人之適故活人不自適故不活身也問蹲循勿爭荅諫之不入蹲循而已慎勿與爭也蹲者蹲踞循者因循厚自晦也莊子妻死惠子弔之至故止也久與之居子既長矣老而身死不哭而歌抑胡忍也莊生曰吾始也亦未能免俗也概然憮然也徐而察之而後悟其無生也是以止也歌哭一也通云勞生惜死是以死傷生也支離叔與滑介叔至我又何惡焉浸假而肘化為柳也化及我也何惡焉通云拄杖子𨁝跳莊子之楚至復為人間之勞乎失理而死耶誅而死耶愧恥死耶饑寒死耶其以壽命死耶髑髏曰否也子所言者生之累也死則否也死者無生也南面王樂不是過也以是知達生者之無生也司命斗七星也通云粟畬裡去顏淵東之齊至是之謂條達而福持褚布囊也綆所以為汲也海鳥爰居也御迓也以己養養鳥不如以鳥養養鳥也福持多厚福也通云闔國人追去不還列子行食於道至皆入於機予知汝汝知予也生無生也死不死也若果得其養乎予果得其歡乎予與汝化也猶物化也化之類不齊矣有情無情皆是也絕水上塵也蛙蠙之衣苔所化也陵屯陵之最高處也陵舄車前草也鬱棲糞壤也烏足草名蠐螬虫名胥即蝶也鴝掇虫名虫裸生故其狀若蛻乾魚骨鳥名蝶化虫虫化鳥皆物化也鳥之沫復為虫斯彌是也食醯一名醯雞即蠛蠓也蠛蠓生頤輅頤輅生九猷九猷生黃軦黃軦生腐蠸腐蠸生瞀芮皆虫類也又化為草草名羊奚羊奚比乎不筍久竹則為青寧青寧虫也程亦虫也或曰豹也越人呼豹為程馬草名俗為馬齒莧或云馬也馬化為人或云人亦草名其形類人故名也有情無情交相化也出於機入於機也非生也非死也通云雲光作牛回途入妙達生離形以養生者全也形全精復與天一也是純氣之守也物之造乎不形而止乎無所化也用志不分也重內而遺外也牧羊者視其後而鞭之因物之自然也為彘謀胡審自為謀胡拙也則養生者失也鬼亦物也見之者非不祥也死生一也木雞全乎德也蹈水有道也器猶是也御猶是也工倕猶是也為而不恃長而不宰至人之行也通云這裡監院房那裡典座房生是不生之理達生之情者至精而又精反以相天生之所無以為者任之可也知之所無奈何者冥之可也物在而形不留也形在而神不旺也生不全也其來不能卻也其去不可止也若猶未免於為也則莫如遺世也遺世故更生也人受形於天地者也合而成體適也其散則反乎所自始也與化移也精之又精是以能相天也通云絕後再甦欺君不得子列子問關尹至民幾乎以其真有形者皆物也物與物何以相遠也不物於物物不得而入也得全於天也干將莫邪不任殺也飄瓦無心也天之天也德生也非賊生也通云泥牛耕水面仲尼適楚至痀僂丈人之謂乎揭竿而承蜩膠其翼而取之術也然有道也橛株斷木也其拘如斷木其執臂若楮枝故累丸而不墜也神也通云立雪斷臂顏淵問仲尼至外重者內拙游者浮水而過沒者泅入水際沒而復出也游者忘水摻舟便沒者忘舟故未嘗見舟而已善操也覆卻不以亂其中故善暇也注射也彈棋類也以瓦巧以鈞憚以金殙有所持則外重也外重而內拙也通云早知當腊汝脛又云何不鬥劣田開之見周威公至而不知為之戒者過也操拔篲猶擁篲執箕帚也堯牽羊舜荷戈而隨之逆也視其後而鞭焉順也縣薄門縣帷薄閶閻下戶也高門下戶行畢至也養其內則或食其外養其外則或攻其內不如順其自然而我不宰也入而藏則己內出而陽則己外柴立其中稿木也塗可畏也衽席之上飲食之間胡不知畏也通云看腳下祝宗人玄端以臨牢筴至所異彘者何也牢筴圈檻也腞楯文縷之案聚僂筐筥也謂死陷刑戮也所異於彘者則何也通云棺材裡瞠眼桓公田於澤至不終日而不知病之去也誒詒倦失志也忿滀鬱而不通也沈泥中也煩壤糞壤也履也髻也雷霆也倍阿也鮭蠪也泆陽也罔象也崒也夔也徬徨也委蛇也或為物怪或為鬼或為神也惡見之故病喜則不知病之去也因禍為福故喜也鬼胡足惡也通云破灶墮紀渻子為王養鬥雞至反走矣嚮景則猶有應者也疾視未忘也無敢應而反走故全也通云烏雞雪上行又云咬人獅子孔子觀於呂梁至不知吾所以然而然命也疑為有苦而欲死也故沒於淵也非也蹈水有道也齊謂入與水齊也汩者沒而復出也通云入水見長人梓慶削木為鐻至器之所以疑神者其是歟鐻戎蠻所以貫耳又鐘圜也驚猶鬼神謂非人力也不懷爵賞故無公朝也木有形有性入山林觀形性本乎木之自然也自然者天也鐻見而加手焉有成鐻也以天合天也通云雕琢不少東野稷以御見莊公至故曰敗中繩中規雖纂組不能過也御而射鉤累百而猶不止馬力竭也故敗也密而不應猶默而不應也通云弄巧成拙工倕旋而蓋規矩至忘適之適也其旋也能蓋乎規矩其指與物化而不以心稽也故一而不桎也忘適之適也通云幾乎忘卻有孫休者至彼又烏能無驚乎哉為其事而靡所恃也長養萬物而不尸其功也此至人之行也款啟猶言管窺也見之少也通云疑則別參山木乘道德浮游故物物而不物於物也其生可樂也其死可葬也虛己以遊世也是大塗也入獸不亂群也入鳥不亂行也不求文以待形也晏然體逝而終也吾惡乎守形而忘身也毋自賢可也通云文殊普賢大人境界莊子行於山中至其惟道德之鄉乎夫子莊子也材與不材之間則無累矣萬物不齊也人倫不一也我合而人且離我也我成而人且毀我也我廉而人且挫我也我尊而人且議我也我有而人且虧我也我賢而人且謀我也我不肖而人且欺我也胡可必哉胡可必哉通云三腳驢子市南宜僚見魯侯至遊於大莫之國胥相也疏遠也無形倨艮其身也無留居行其庭也無崖故望崖而反也有人未忘乎人也見有於人未忘乎己也大莫廣莫也通云鐵船入海又云休糧不饑方舟而濟於河至其孰能害之呼張歙謂疾呼張目作聲也歙合也目已張復合也通云不采無窮北宮奢為衛靈公賦斂至而況有大塗者也縣鐘虡也守一而已無所設也侗乎其愿而無識也儻乎其怠而若疑也曲傅回曲而附我也窮盡也大塗通塗也震為大塗通云借座燈王請飯香積孔子圍於陳蔡之間至而況人乎意怠海燕也食有緒也行有列也其為道也任其流止而不自謂明也其為居也得其行列而不名其處也至人無聞也通云牛頭未見四祖孔子問子桑虖至固不待物假地名林回假人也布猶施也千金人屬也赤子天屬也挹損也真冷謂以真語告曉也冷曉也或曰叮嚀也率情故不求文緣形故待形也足於己無待於物也通云皮膚脫落盡莊子衣大布而補之至徵也夫抩交讓木原憲曰貧也非病也通云今年貧錐也無孔子窮於陳蔡至晏然體逝而終矣廣己而造於大則己過矣愛己而造於哀則己不及矣始猶卒也人猶天也無二道也泄散也與之偕行故天損不入也爵祿並至可謂榮矣然物之利也非己也命在外也取之非吾有也盜也竊也鷾鴯即意怠也所不宜處則疾去月不暇給也落其實不顧也襲諸人間不得已也不受人益也禪代也人亦天也天亦人也人不能及天者性也體逝而終者聖人也通云瀏陽不遠莊周遊乎雕陵之樊至吾所以不庭也殷盛也蟬惑於蔭螳蜋惑於蟬鵲惑於螳蜋莊生惑於鵲也遊於栗林而忘真乃為虞人者叱也則見鵲也以見為累也守形而忘身也二類謂利與害類也通云莫眼花陽子之宋至安往而不愛哉美惡同形也不自賢則人愛之也通云一雙孤雁撲地高飛一對鴛鴦池邊獨立
