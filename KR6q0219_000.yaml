front:
  text: 漆園指通序古今著莊子者亡慮數百十家各自其所見以為解莊子未嘗不遇也太史公曰莊子著書率寓言無事實洸洋自恣以適己後人惡其越禮破經不可為訓晉人清談放達實始於莊此非莊子之過不善讀莊子者之過也自我觀之莊子有用世之學有用世之志知世不可用遂詭託諸大而無用之言而又自明其志曰無所可用安所困苦哉衣繡之犧曳尾之龜蓋審之熟矣莊子與孟子同時其才具足相當特小黠耳孟子往來於齊梁之間舌敝唇焦以破儀衍之說而進仁義之論才小用於滕幾至亡國仁義之不能行於當世明矣莊子訾仁義毀先王似有鑒於孟子而立說也使當世有用莊子之言者其禍豈不更烈於仁義而莊子之黠在秪存其言於世而決不為世用此其藏身之妙固非孟子可及也雖然莊子之學未嘗不可用特不可用於戰國時耳齊物論之因是因非養生主之以無間入有間人間世之託不得已以養中德充符之不唱而和大宗師之兩忘而化於道應帝王之不將不迎此非用世之格言乎又曰物者莫足為也而不可不為曰上必無為而用天下下必有為為天下用諸如此說豈亡世者耶大抵莊子以自然為宗以不得已為用而其學本諸大易之因司馬談曰不為物先不為物後因時為業因物與合可謂善言莊子者矣郭象以莊子之旨生時安生死時安死生死之情既齊則無為當生而憂死矣緣於不得已則所為皆當甚矣象之解莊有當於吾之解莊也今人於莊道者見之謂之道禪者見之謂之禪精於儒者見之謂之通乎三教此指通之所由著也俍亭大師儒而禪者也於莊作禪解於解作禪語解之妙固非吾可思議語之妙直可自作一書昔人謂郭象之注莊王輔嗣之注易離莊與易其注自可孤行今俍師之書亦猶是也夫俍師之逃於禪與莊子之不用於世皆以無用為用而吾之論莊則與俍師之解莊其旨趣各不相謀即吾之南華得意一書其說又與吾今之論自異要無不可以遇莊也亦猶莊子之書自相反覆無往而非莊子一家言也莊子曰萬世而下知其解者猶旦暮遇之吾與師亦各遇其所遇耳龍眠同學法教弟錢澄拜題漆園指通序莊周惠施生襄周其言瑰異汪洋暗與道會石渠天祿諸儒專務經術則固有所忽遑也江左以來喜談名理踞胡床握麈柄庶幾近之俍亭和尚攄奧衍之鴻文挹清虛之祕府曩嘗與余探羲皇溯河雒能使充宗折角輔嗣扶輪余每嘆為不可及邇乃披襟蔥嶺遊歷竺乾總百氏之紛紜辨五宗之同異筆之所涉口之所宣莫不晰精窮幽探微入妙間取南華一帙參之己意綴以群言向郭結其鋒鋩支許停其辨論嗚呼异已寒蘆未折璧觀未成遠公結社於廬山道安振衣於河朔奉周易善老莊大義微文炳如星日不有俍公奚以發其覆載是書出而東海聖人西海聖人當共望塵而拜矣鴛水法弟錢江拜手題漆園指通序沖虛鴻烈與南華為倡和而猶龍之學不孤晉人喜讀老易向郭注莊猶彥輔之於玄輔嗣之於易也不異人意云爾也夫易不盡於焦贛也夫詩不盡於韓嬰也自京房談易則任舉之皆易自崖生說詩則任舉之皆詩也雲溪指莊何其合也雲溪曰南華者奧矣博矣是道家之言也三墨八儒概乎其未有取也無已而一用之於禪其六合之內歟是六合之外歟古之得道者歟古之得道者歟吾庶幾一遇歟向郭而後解莊者多矣文不類也旨不類也讀雲溪之書則依然見莊子也吾無間也吾無間也廢莊廣莊皆剩筆也康熙辛亥夏日禹航同學法弟嚴沆題於維揚旅次漆園指通後序莊子之書為晉儒所稱引至唐天寶而名其書為經可謂尊之至矣然自郭向而外或注或論或講疏率各出其所見以上窺乎莊子著書之指而於寓言洸洋自恣之意亦少失矣夫莊子之論道也自然而然而卒莫知其所以然故得莊之深者不求甚解者也使執字句而強索其解則開卷之始鯤之大鵬之背豈真幾千里而蜩鳩斥鴳之無知乃能開口而笑哉嗚呼亦未達其理矣雖然莊之言愈放而其義則固非有為而為之說者余嘗謂自古注莊不下數十家而莫善於司馬遷之一言曰莊子散道德放論要亦歸之自然蓋自然者莊子著書之本也今讀俍和尚之解莊也或約言以該義或冥悟以達微變現無端而要無失乎作者自然之意故謂俍和尚之解莊也可謂莊之自為解亦可謂解莊而即自為莊亦無不可矣夫大道之紛也吾儒以外有老與佛之名莊故聃之徒也讀盜跖漁父若深詆乎吾道而王安石蘇軾之論又謂其能存聖人之道而尊之者今俍和尚復為通之以進於禪解則南華一編且開白馬傳經之始嗚呼莊子守道德五千言之教而不棄於儒且入於佛莊其古之通人哉然非俍和尚則烏能解之哉康熙辛亥夏日邗州後學許承家拜手書
